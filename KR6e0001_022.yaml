body:
  text: 東晉天竺三藏佛馱跋陀羅譯金剛幢菩薩十回向品第二十一之九菩薩摩訶薩以此善根如是回向不著色故回向不著聲香味觸法故回向不求生天故回向不求欲樂故回向不著欲境界故回向不求眷屬故回向不求自在故回向不求生死樂故回向不著生死故回向不著死此生彼故回向不求三有樂故回向不求欲相應故回向不求樂處故回向不毒心故回向不壞善根故回向不依三界故回向不味著諸禪解脫三昧正受故回向不求住聲聞緣覺乘故回向但欲調伏一切衆生滿足薩婆若究竟無礙智故回向欲令一切善根清淨無礙故回向欲令一切衆生超出生死得大乘智故回向欲滿足金剛菩提心故回向欲究竟成就不死法故回向欲無量莊嚴諸佛種姓示現一切智自在故回向欲具足菩薩一切法明神力自在故回向欲於法界虛空界等一切佛剎行普賢行而不退轉以離癡金剛大莊嚴而自莊嚴安住普賢菩薩地故回向欲盡未來劫行普賢行度脫衆生示現一切諸佛莊嚴行地安住不斷故回向菩薩摩訶薩如是平等心回向平等法心回向一切衆生無量心回向無諍心回向無所有心回向不亂心回向等入三世心回向於三世諸佛種姓心回向得不死神通心回向得如來涅槃心回向令一切衆生離地獄餓鬼畜生閻羅王處故回向令一切衆生除滅障道法故回向令一切衆生悉具善根歡喜故回向欲不失轉法輪時故回向欲令一切衆生成十力輪到彼岸故回向欲令滿足無量無邊菩薩清淨法願故回向欲令成就善知識器隨順一切善知識教具菩提心寶故回向欲令一切住佛深法正直修習一切佛法具足無上智慧光明故回向欲令一切菩薩無礙慧明常現在前故回向欲令一切常見諸佛現在前故回向欲令一切得明淨法門故回向欲令一切離諸恐怖具無所畏菩提心門故回向欲令一切得菩薩不可思議諸住智門故回向欲令一切大悲救護悉得清淨故回向欲令一切無餘佛剎皆悉莊嚴故回向欲令一切除滅一切魔業鉤餌及魔巧術故回向欲令一切修菩薩行不著一切佛剎故回向欲令一切度一切佛法得一切智廣大心故回向菩薩摩訶薩以此善根欲令正念清淨故回向欲決定故回向欲攝取一切佛法分別了知故回向欲得無量無邊無礙智故回向欲得清淨正直心故回向欲令一切衆生修習大慈心故回向修習大悲心故回向修習喜心故回向修習捨心故回向得二種無礙解脫安住善根故回向欲分別一切緣起法故回向欲分別緣起法得法化生心故回向欲得勇猛幢心故回向欲得不壞幢藏故回向欲壞一切魔故回向欲得一切清淨無礙法心故回向欲行一切菩薩行得不退轉心故回向欲得樂求勝妙心故回向欲得一切功德法自在智樂求一切智故回向欲滿一切願滅一切惡受離垢記得佛自在為一切衆生轉不退法輪故回向欲令如來諸妙勝法無量智慧日光莊嚴大智光明普照一切衆生法界故回向欲調伏一切衆生皆悉歡喜成就大願盡未來劫行菩薩行滅諸煩惱離垢清淨壞裂愛網除愚癡暗具足離垢無礙之法修行菩薩不退轉行得一切種智故回向欲令一切衆生得無礙無上妙智慧身示現無量諸佛身故回向菩薩摩訶薩善根如是回向不著五欲不依三界何以故菩薩摩訶薩以無染污善根回向遠離瞋恚善根回向捨離愚癡善根回向不可沮壞善根回向遠離憍慢善根回向除滅諂曲善根回向以正直心善根回向精勤修習善根回向菩薩摩訶薩如是回向時得大歡喜於菩薩行得正希望趣摩訶薩道具佛種姓得佛智慧離一切惡降伏衆魔悉能調伏一切衆生令善知識皆悉歡喜己所修願皆悉成滿請一切衆生設大施會復次菩薩摩訶薩以此法施善根如是回向令一切衆生皆悉具足清淨法音得柔軟音得和悅音得不可思議音得可愛樂音得充滿一切佛剎音得不可思議功德莊嚴音得滅高大散亂音得充滿法界淨妙音得攝一切衆生音令一切衆生得無量音智令一切衆生得清淨妙音令一切衆生悉得音聲妙自在智令一切衆生得一切莊嚴音令一切衆生悉得妙音衆生樂聞無有厭足令一切衆生得解脫音悉到彼岸令一切衆生得歡喜音令一切衆生得佛清淨語言音令一切衆生得佛音聲具妙辭辨遠離愚癡令一切衆生得莊嚴諸法妙陀羅尼於一一法説無量行眷屬無數充滿法界悉能聞持不可思議金剛正法廣分別説能以無量句身味身具足演説無量法藏種種法相住無著處得諸法明令一切衆生究竟薩婆若攝一切法以句身味身於諸法義得自在音於無礙音具足自在得到彼岸令一切衆生得無憂音聲得無畏音聲得無染污音聲得功德音聲得令眷屬歡喜音聲得如法音聲得諸佛法語言音聲得疾除滅一切衆生疑網音聲得具足辨才不斷音聲得勝覺悟衆生音聲復次菩薩摩訶薩以此善根如是回向令一切衆生得淨法身令一切衆生得淨妙功德令一切衆生具諸相好令一切衆生得淨業報令一切衆生得清淨薩婆若心令一切衆生得無量清淨菩提之心令一切衆生得淨方便悉能分別衆生諸根令一切衆生得清淨性令一切衆生得清淨無礙行滿足諸願令一切衆生得清淨正念智慧不斷辨才菩薩摩訶薩以此善根如是回向令一切衆生得如是等清淨妙身所謂明淨身離濁身究竟淨身清淨身離塵身離種種塵身離垢身光明身可愛樂身無礙身以如是身普應十方一切世界示一切業示現衆生普照一切示現一切猶如鏡像淨水之月令一切衆生悉得如是淨妙之身示現衆生菩薩諸行示現衆生諸深妙法示現衆生無量功德示現衆生真實正道示現衆生具足諸法示現衆生一切大願住於一剎示現一切世界如來出世示現一切諸佛神足自在示現受持菩薩不思議解脫示現普賢諸行一切願智菩薩摩訶薩善根如是回向令一切衆生成就一切功德智身復次菩薩摩訶薩以此法施所攝善根如是回向令一身遍一切世界行菩薩行衆生見者皆悉不空得不退轉菩提之心令一切衆生隨順真實得不壞心令一切衆生於一切世界盡未來劫行菩薩道而無厭足具法界等大慈悲心教化衆生未曾失時分別諸根念善知識於一念中悉見現在一切諸佛正念如來未曾暫捨修諸善根無有虛欺安立衆生於一切智悉得不退清淨法輪悉得一切諸佛法明受持一切諸佛法雨行菩薩行入一切衆生入一切剎入一切法入一切世間入一切三世入一切衆生諸業報智入一切菩薩巧方便智入一切菩薩出生智入一切菩薩淨境界智入一切佛住持境界入一切無量無邊法界修菩薩行安住諸住是為菩薩摩訶薩法施善根回向復次菩薩摩訶薩修善根業如是回向令一切佛剎皆悉清淨以無量莊嚴具而莊嚴之令一佛剎廣大如法界如一佛剎一切佛剎亦復如是得最正覺於一佛剎悉皆顯現一切佛剎如一佛剎一切佛剎亦復如是彼一一剎以法界等諸莊嚴具而莊嚴之無量阿僧祇衆寶莊嚴無量阿僧祇清淨衆寶高座諸妙寶衣以敷其上無量阿僧祇衆妙寶帳一切寶鈴諸寶垂帶以為莊嚴無量寶蓋以張其上無量寶雲雨一切寶散衆寶華見者無厭無量妙寶以為欄楯妙寶樓閣而莊嚴之無量寶鈴自然演暢諸佛妙法無量寶華周遍充滿衆妙寶色以為莊嚴無量寶樹充滿其剎出生無量妙寶華果無量妙寶以為宮殿妙寶樓觀遍遊諸剎無量妙寶以為欄楯大寶莊嚴無量妙寶為偏樓閣一切淨寶而莊嚴之無量寶門種種寶鬘而嚴飾之無量珍寶半月形像悉以衆寶而莊嚴之無量無數不可思議珍寶莊嚴諸佛淨業善根所起無量寶藏莊嚴又以衆寶而莊嚴之流出無量清淨寶河常流正法未曾斷絶無量法海周遍其剎正法淨水湛然充滿無量阿僧祇寶分陀利華皆悉充滿自然演出正法華音無量阿僧祇須彌寶山莊嚴智慧須彌皆悉具足無量阿僧祇八楞妙寶莊嚴諸寶瓔珞以為垂帶無量阿僧祇明淨寶莊嚴放大慧光普照法界無量阿僧祇寶鈴莊嚴自然演出微妙音聲無量阿僧祇衆寶階道以為莊嚴菩薩妙寶皆悉充滿無量阿僧祇寶繒莊嚴不可思議寶色清淨建立無量阿僧祇寶幢莊嚴半月寶像而嚴飾之無量阿僧祇寶幡莊嚴悉能普雨無量寶幡無量阿僧祇寶繒莊嚴充滿世界莊飾虛空敷無量阿僧祇細軟寶衣以為莊嚴無量阿僧祇衆寶旋流以為莊嚴示現菩薩清淨一切智眼無量阿僧祇寶鬘莊嚴一一寶鬘百千菩薩以為嚴飾無量阿僧祇衆寶宮殿莊嚴悉能除滅諸處所愛無量阿僧祇衆寶莊嚴金剛摩尼以為嚴飾無量阿僧祇雜寶莊嚴示現無量清淨妙色無量阿僧祇金剛圍山莊嚴清淨明徹無所障礙無量阿僧祇妙香莊嚴其香普熏一切世界出生無量阿僧祇諸變化身一一化身與法界等各放無量阿僧祇妙寶光明一一光明出一切光無量阿僧祇明淨寶光以為照耀能發衆生淨智慧光放無量阿僧祇無礙寶光一一光明普照法界無量阿僧祇衆寶莊嚴一一寶中具一切寶無量阿僧祇寶藏莊嚴自然演説諸法寶藏無量阿僧祇寶幢莊嚴建立如來妙智慧幢無量阿僧祇賢寶莊嚴具足清淨大乘賢寶無量阿僧祇寶園莊嚴菩薩三昧清涼悅樂無量阿僧祇諸妙寶音自然演出一一音中出如來音充滿十方無不聞者無量阿僧祇寶像莊嚴一一像身普放無量法寶光明無量阿僧祇衆相莊嚴一切衆相無相莊嚴無量阿僧祇寶威儀莊嚴見者樂求菩薩威儀無量阿僧祇長養衆寶莊嚴出生一切妙寶庫藏無量阿僧祇衆寶安住莊嚴一切衆寶而嚴飾之無量阿僧祇寶衣莊嚴皆悉普覆具足菩薩無量三昧無量阿僧祇妙衣莊嚴其發心者即得菩薩善現等諸陀羅尼無量阿僧祇修寶莊嚴悉能分別業寶報應決定清淨無量阿僧祇無礙知見妙寶莊嚴若有見者悉得諸法清淨法眼無量阿僧祇寶天冠莊嚴具足成就智慧天冠無量阿僧祇寶座莊嚴成佛清淨寶師子座然無量阿僧祇明淨寶燈具足明淨妙智慧燈無量阿僧祇寶多羅樹莊嚴一一多羅樹以寶瓔珞而嚴飾之無量阿僧祇衆寶涼臺以為莊嚴無量阿僧祇寶樹莊嚴不思議鳥棲集其上出妙音聲無量阿僧祇妙寶化華莊嚴一一華上無量菩薩結跏趺坐遍遊法界無量阿僧祇果實莊嚴具薩婆若大智慧果無量阿僧祇衆寶聚落莊嚴皆悉修習清淨正法無量阿僧祇寶宅莊嚴衆寶街巷人民充滿無量阿僧祇大王寶都莊嚴彼諸大王勇猛精進被大法鎧於無上道堅固不退無量阿僧祇寶舍莊嚴除滅一切房室貪愛無量阿僧祇寶衣莊嚴隨意受用無所貪著無量阿僧祇寶家莊嚴捨家出家菩薩充滿其中無量阿僧祇無厭足寶莊嚴見者能生無量歡喜無量阿僧祇寶輪莊嚴放不思議智慧光明轉不退輪無量阿僧祇妙寶行樹莊嚴以清淨因那尼羅寶而莊校之無量阿僧祇寶地莊嚴分別示現不思議寶無量阿僧祇樂器莊嚴出自然音充滿法界無量阿僧祇樂器莊嚴盡未來際常出法音未曾斷絶無量阿僧祇寶身莊嚴充滿其剎悉能受持一切法寶無量阿僧祇清淨寶口莊嚴具足一切功德藏寶出無量阿僧祇淨寶言音常説無量淨妙法寶無量阿僧祇清淨寶心莊嚴得正直寶一切智願皆悉充滿無量阿僧祇清淨寶念莊嚴除滅愚癡得一切智無上寶王無量阿僧祇清淨寶趣莊嚴悉能攝受一切諸佛正法之寶無量阿僧祇菩薩寶慧莊嚴決定善知一切佛法無量阿僧祇不放逸寶智慧莊嚴一切智寶皆悉充滿無量阿僧祇清淨寶眼莊嚴於一切十力寶無所障礙無量阿僧祇清淨寶耳莊嚴善能聽聞一切法界微妙音聲而無障礙無量阿僧祇清淨寶