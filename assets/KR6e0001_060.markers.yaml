  - {type: punctuation, offset: 3208, content: ：, id: KR6e0001_T_060-bkkpn639}
  - {type: punctuation, offset: 3208, content: 「, id: KR6e0001_T_060-bkkpn640}
  - {type: variant, offset: 3208, length: 252, content: 何當會遇，面奉慈顏？」作是念時，文殊師利遙伸右手，過百一十由旬，至普門城，摩善財頂而作是言：「善哉！善哉！善男子！若離信根，憂悔心沒，功行不具，退失精勤；於少功德，便以為足；於一善根＝一切善【三】【宮】一善根【大】，一切善【宋】【元】【明】【宮】一善根一切善，心生住著；不〔善〕－【三】【宮】善【大】，〔－〕【宋】【元】【明】【宮】善發起菩薩行〔願〕－【三】【宮】願【大】，〔－〕【宋】【元】【明】【宮】願，不為善知識之所攝護，不為如來之所憶念。是等皆悉不能了知如是法性、如是理趣、如是所行、如是所住；若周遍知、若種種知、若盡原＝源【三】【宮】原【大】，源【宋】【元】【明】【宮】原源底、若漸趣入、若解說、若分別、若證知、若獲得；皆悉不能。」是時，文殊師利為善財童子示教誨已，慰諭＝喻【宮】諭【大】，喻【宮】諭喻令其歡喜踊躍，令得成就阿僧祇法門，得無量大智光明、無量菩薩陀羅尼、無量大願、無量三昧、無量神通、無量智慧，皆已＝悉【明】已【大】，悉【明】已悉成就；復令得入普賢所行道場之內。既置善財自所住已，文殊師利還攝不現, 聖: ''}
