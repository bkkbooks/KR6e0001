  - {type: variant, offset: 8604, length: 108, content: 華嚴經梵本凡十萬偈，昔道人支法領，從于闐國得此三萬六千偈，以晉義熙十四年歲次鶉火三月十日，於揚州司空謝石所立道場寺，請天竺禪師佛度跋陀羅，手執梵文譯梵為晉，沙門釋法業親從筆受。時吳郡內史孟顗、右衛將軍褚叔度為檀越，至元熙二年六月十日出訖。, 宋: '', 宮: '', 聖: ''}
