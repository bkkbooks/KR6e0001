  - {type: variant, offset: 4057, length: 215, content: 「佛子！一切諸佛，一步能過不可說不可說世界微塵等佛剎；於一念中，能行不可說不可說世界微塵等步。以如是步，經一切世界微塵等劫，於念念中，能經一切世界微塵等劫。一金剛圍山，與上諸劫所經世界微塵佛剎等；如是等不可說不可說世界微塵數，諸金剛圍山內一毛孔，一切毛孔，亦復如是。如來毛孔，悉與一切眾生毛孔數等；以如是毛孔，如是遠步，如是速疾，遊行十方一切世界，一切虛空界，盡過去、未來際一切諸劫；如是諸劫，猶可窮盡，而諸如來身無羸弊，心不退沒，不捨三昧一切佛事。佛子！是為一切諸佛第三大力那羅延幢佛所住法。, 聖: ''}
