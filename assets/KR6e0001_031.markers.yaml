  - {type: punctuation, offset: 4272, content: 「, id: KR6e0001_T_031-bkkpn828}
  - {type: variant, offset: 4272, length: 145, content: 佛子！一切諸佛，一食＝一坐食已【三】【宮】一食【大】，一坐食已【宋】【元】【明】【宮】一食一坐食已，結跏趺坐，盡過去、未來際不可說不可說一切劫，身不傾動，住不思議＝不可思議【三】【宮】不思議【大】，不可思議【宋】【元】【明】【宮】不思議不可思議佛住，受寂滅樂，乃至不失化一眾生。以一切世界，及一切眾生，安置如來一指端上，盡未來際劫；彼一一眾生，其身悉如不可說不可說佛剎微塵等世界；彼一一眾生，其身重如一切世界，而諸如來，身無疲倦，心無苦惱。如一指端，一切指端，亦復如是；入一一世界，入虛空界，入一切方網，, 聖: ''}
  - {type: punctuation, offset: 4274, content: ！, id: KR6e0001_T_031-bkkpn829}
  - {type: punctuation, offset: 4278, content: ，, id: KR6e0001_T_031-bkkpn830}
