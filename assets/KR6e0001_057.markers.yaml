  - {type: variant, offset: 8139, length: 1, content: 澤, 宋: 澤已上一段五紙餘經自東晉義熙年覺賢禪師翻譯之後傳寫之人脫落也歷涉朝代補綴攸闕　聖宋元祐年福州等覺禪院開大藏經印板方撿唐垂拱年中天竺國日照法師續法界品及于闐法師實叉難陀新經較勘合入貴文理接續法寶無缺矣, 宮: 澤已上一段五紙餘經自東晉義熙年覺賢禪師翻譯之後傳寫之人脫落也歷涉朝代補綴攸闕　聖宋元祐年福州等覺禪院開大藏經印板方撿唐垂拱年中天竺國日照法師續法界品及于闐法師實叉難陀新經較勘合入貴文理接續法寶無缺矣, 元: 澤賢首藏師探玄記云自下九位知識皆是舊翻于闐本所欠應是西域覺賢之所略耳余共日照三藏勘天竺諸本及崑崙本并于闐別行本並皆同有此文是以於大唐永隆年西京西太原寺三滅法師地婆訶羅唐云日照共京十大德道成律師等奉勅譯補沙門復禮親從筆受, 明: 澤賢首藏師探玄記云自下九位知識皆是舊翻于闐本所欠應是西域覺賢之所略耳余共日照三藏勘天竺諸本及崑崙本并于闐別行本並皆同有此文是以於大唐永隆年西京西太原寺三滅法師地婆訶羅唐云日照共京十大德道成律師等奉勅譯補沙門復禮親從筆受}
