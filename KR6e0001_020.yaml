body:
  text: 東晉天竺三藏佛馱跋陀羅譯金剛幢菩薩十回向品第二十一之七佛子何等為菩薩摩訶薩第八如相回向佛子此菩薩摩訶薩成就念智安住不動離癡正念直心不動成就堅固不可壞業一切智境界得不退轉得大乘勇猛無畏之心修習無盡善根積集勝妙善根修白淨法增長大悲得正直寶常能正念一切諸佛白淨法回向心不退轉樂求菩薩道巧妙方便出生清淨堅固善根正念修習智慧功德為調御師具足出生一切善根智慧方便回向衆生慧眼清淨悉能觀察一切善根長養無量種種善根分別境界善根具足善根清淨善根一向善根修習善根行善根思惟善根平等廣説善根菩薩摩訶薩如是善根有種種門種種境界種種相種種事種種分別無量行無量語言道出生無量分別修行種種莊嚴善根悉能正持十力諸乘菩薩摩訶薩修習如是種種善根一觀無二一切智境菩薩摩訶薩以如是等善根回向欲令具滿無礙身修菩薩行欲令口業清淨無礙修菩薩行欲令具足無礙心業安住大乘具無礙心令菩薩行皆悉清淨得無量大施心充滿一切衆生得法自在心照一切法普示世間得最勝不可壞心得清淨一切種智發菩薩心普照一切正念三世一切諸佛念佛三昧悉得具足滿足離害正直之心遠離怨敵任持衆生充滿一切而無休息於十力智悉得安住得深三昧悉能遍遊一切世界無所染著悉住一切剎而無厭足化度衆生未曾休息出生無量巧便思慧具足成就一切菩薩不思議慧得離癡智悉能分別一切世界於一念中悉能嚴淨一切佛剎於諸通慧而得自在入一切法真實之相示現嚴淨一切世間於一剎中見一切剎究竟不壞智能持一切剎以菩薩莊嚴具而莊嚴之應現一切悉能調伏無量衆生一佛世界廣大如法界一切世界亦復如是得究竟智詣一切剎一切普持菩薩摩訶薩以此善根回向佛剎令衆生充滿回向分別受持智慧如為己身為衆生回向亦復如是令一切衆生永離地獄餓鬼畜生閻羅王處令一切衆生悉能除滅諸障礙業令一切衆生悉得等心平等智慧令諸怨敵具慈心樂清淨智慧令一切衆生智慧現前圓滿具足普照一切令一切衆生具真實智離垢正直菩提心無量智慧滿足令一切衆生示現平等安隱善趣菩薩摩訶薩如是回向修習善根及一切願如大雲雨令一切衆生皆悉清淨令一切衆生為功德福田令一切衆生守護受持菩提內藏令一切衆生離諸障礙安住無礙清淨法界令一切衆生滿足無礙諸通智慧令一切衆生得自在身遊行十方如應示現令一切衆生得無癡善根一切種智令一切衆生攝取一切悉令清淨令一切衆生遠離障礙瞋恚之心究竟成就一切種智復次菩薩摩訶薩若見可樂國土林樹華果或見可樂名香上服珍寶財物諸莊嚴具或見可樂園觀村邑聚落王都或見可樂自在帝王或見可樂阿練若處菩薩摩訶薩見如是已修巧方便出生無量淨妙功德樂求實義為衆生故而不放逸善能修習一切善根猶如大海難可測量具足善根不可窮盡一切功德皆悉滿足亦不分別種種善根巧妙方便清淨回向示現無量諸行善根常念一切未曾忘失衆生境界如善根平等善根菩薩摩訶薩善根如是回向令一切衆生志常樂見無量諸佛如法不取法性無數衆生平等清淨亦復如是令一切衆生悉得諸佛隨意愛樂供給侍者令一切佛國除滅煩惱清淨可樂令一切衆生悉得見聞無量佛法心常愛樂常樂守護諸菩薩行樂以愛眼觀善知識令一切衆生見可樂法令一切衆生樂持正法令一切衆生於佛法中得可樂明令一切菩薩悉得可樂大施之心於諸法中得無所畏樂為衆生分別廣説得菩薩可樂三昧諸陀羅尼得一切菩薩授記智慧得一切菩薩甚可愛樂自在示現具足諸佛圓滿説法得可樂方便分別説法得可樂大悲發菩薩心諸根悅豫得可愛樂諸如來家教化衆生心不休息得菩薩可樂無盡法藏於無量劫一一世界化度衆生於現在佛所得可愛樂巧妙方便得可愛樂深妙方便無所障礙永離愚癡具足可樂平等離欲一切諸法斷諸障礙決定深解不二法界具足可樂離欲際等一切諸法入真實際得菩薩可樂無諍滿足之法具足可樂金剛藏心一切種智勇猛精進清淨成滿具足可樂清淨善根摧伏怨敵滅障道法具足可樂無上菩提一切種智常現在前充滿衆生如是菩薩摩訶薩長養善根得淨慧明常為善知識之所攝護如來慧日明照其心滅除癡暗淨修正法入諸智業善學智地分別法界一切善根善能回向一切菩薩諸善根海盡其原底成就智慧深入堅固明解善根了達諸度菩薩摩訶薩善根如是回向不著世界不著衆生界心無所依寂然不亂正念諸法具足諸佛無選擇智不違三世一切諸佛正回向門不違一切平等正法不壞佛相等觀三世了衆生空無所依住順如來道普照諸法解真實義漸至諸地如實分別一切諸法智慧周滿具足堅固未曾忘失修習正業常樂寂靜正趣離生了一切法猶如幻化解一切法無有自體觀一切義及種種行於語言道而無所著所有諸法皆從緣起觀甚深法生實智回向觀察寂滅一切諸法皆入一觀不違諸法種種異相善解回向修菩薩道善根回向攝取衆生長養三世菩薩一切回向如是菩薩摩訶薩以無恐怖心善根回向一切佛法以無量心善根回向一切衆生皆悉清淨以無我無我所心善根回向於十方界無所染著以無餘心善根回向於一切境界世界無所染著行離世間法善根回向得出世法不著衆生善根回向見諸勝道善根回向離虛妄法出生真實善根回向如法門至一切道無量無邊善根回向如如善根亦爾回向衆生解了諸法如性如善根亦爾回向一切法自性無有自性如相如善根亦爾回向一切法無相真實相如法如善根亦爾回向佛法不退轉如行如善根亦爾回向一切如來所行如境界如善根亦爾回向三世諸佛滿足境界如安立如善根亦爾回向安立一切衆生如隨順如善根亦爾回向盡未來劫隨順不斷如量如善根亦爾回向衆生心與虛空等如充滿如善根亦爾回向一念滿一切世界如久住如善根亦爾回向離一切世間住住究竟住如不生如善根亦爾回向不生滿足一切佛法如堅固如善根亦爾回向壞散一切煩惱如不壞如善根亦爾回向一切衆生不可破壞如明如善根亦爾回向普照一切如一切處如善根亦爾回向至一切處道如一切時如善根亦爾回向隨順一切時如一切如善根亦爾回向一切衆生隨順清淨如一切平等如善根亦爾回向一切行平等如一切法眼如善根亦爾回向一切衆生悉得法眼如不倦如善根亦爾回向一切行菩薩道而無疲倦如甚深如善根亦爾回向一切第一深法如無所有如善根亦爾回向知一切無所有如不出如善根亦爾回向一切無所顯現如離曀如善根亦爾回向明眼離曀清淨如無比如善根亦爾回向菩薩無比之行如寂靜如善根亦爾回向一切常樂寂靜如無根如善根亦爾回向究竟無根之法如無量無邊如善根亦爾回向一切無量無邊衆生皆悉清淨如無著如善根亦爾回向究竟無所著際如無礙如善根亦爾回向滅除一切障礙如非世間行如善根亦爾回向遠離一切世間行法如不繫如善根亦爾回向不繫一切生死如無行如善根亦爾回向遠離一切諸行如住如善根亦爾回向一切住於如住如一切法成如善根亦爾回向衆生所學成就如一切法平等如善根亦爾回向一切具平等行如一切法不捨如善根亦爾回向不捨盡未來際一切衆生如一切法不盡如善根亦爾回向一切無盡衆生如不違一切法如善根亦爾回向一切衆生不違三世諸佛如攝一切法如善根亦爾回向一切衆生悉攝善根令無有餘如一切法同如善根亦爾回向悉同三世諸佛如一切法不離如善根亦爾回向悉攝世間及離世間如不可壞如善根亦爾回向一切衆生不可沮壞如無恚如善根亦爾回向一切衆生一切魔業所不能動如不濁如善根亦爾回向一切菩薩行無有垢濁如不亂如善根亦爾回向一切衆生離諸塵亂如不可盡如善根亦爾回向一切世間法所不能盡如菩提如善根亦爾回向覺悟一切諸法如不失如善根亦爾回向一切衆生不失直心如照如善根亦爾回向一切衆生悉以大智光明普照一切如不可説如善根亦爾回向一切不可説智如持一切衆生如善根亦爾回向一切持菩薩行如隨順一切語言如善根亦爾回向一切無言智慧如離一切種種法如善根亦爾回向示現一切佛剎及諸如來成最正覺示現無量神力自在如離虛妄如善根亦爾回向世間悉離虛妄如一切身遍至如善根亦爾回向無量身遍一切剎如不受生如善根亦爾回向無生巧妙方便示現受生如無不有如善根亦爾回向三世一切諸佛自在神力及一切剎在身內現如夜如善根亦爾回向一切夜施作佛事得無上明如晝如善根亦爾回向一切在晝衆生悉令善覺見諸如來自在神力住不退法輪離癡清淨如半月及一月如善根亦爾回向一切衆生住一切時巧妙方便於一念中悉能分別一切時節如年歲如善根亦爾回向受持種種諸劫嚴淨諸根了達諸根如一切劫成敗如善根亦爾回向一切劫淨住無染一切衆生清淨調伏衆生如未來如善根亦爾回向盡一切未來際修習菩薩清淨妙行悉能滿足無量大願如世如善根亦爾回向一切衆生於一念中見一切佛乃至未曾一念遠離如至一切處道如善根亦爾回向一切衆生得不壞道超出三界如有無如善根亦爾回向一切諸有清淨知無所有如淨如善根亦爾回向一切菩薩淨行出生無上菩提之具如明淨如善根亦爾回向得菩薩一切三昧明淨之心如離垢如善根亦爾回向離一切垢淨心滿足如無我所如善根亦爾回向攝取無我我所清淨之心充滿十方一切佛剎如平等如善根亦爾回向得無盡一切智永離癡愛普照一切如無數如善根亦爾回向一切智乘力住巧方便法雲普覆一切世界如平等住如善根亦爾回向一切衆生具菩薩行住一切智如分別一切衆生界如善根亦爾回向一切善根現前滿無礙智如一切衆生語言如善根亦爾回向解了一切諸語言法如不離一切衆生如善根亦爾回向攝取一切衆生具足善根遠離生死如廣如善根亦爾回向受持三世佛所説法修習菩薩離癡之行如不休息如善根亦爾回向一切劫修菩薩行未曾休息安處衆生於摩訶衍如一切法第一如善根亦爾回向開淨法門無礙淨念攝一切法如無量讚歎如善根亦爾回向得無量讚歎智慧菩薩實行如離熾然如善根亦爾回向離熾然法滅除衆生熾然令得清淨如不動如善根亦爾回向善根安住不動滿足普賢菩薩願行如諸佛境界如善根亦爾回向一切衆生智慧境界皆悉滿足除滅一切煩惱境界如不可壞如善根亦爾回向善根一切魔業所不能壞悉能調伏衆邪外道如非可修非不可修如善根亦爾回向離一切修非修虛妄斷一切虛妄如不退如善根亦爾回向常見一切諸佛未曾中退修習莊嚴菩提之心如一切語言如善根亦爾回向分別一切語言如不著一切法如善根亦爾回向一切衆生悉無所著令一切衆生行普賢行如一切地如善根亦爾回向一切衆生悉得隨順智慧之地普賢莊嚴如不可斷如善根亦爾回向一切法中得無畏無斷一切語言周滿具足能廣演説如無漏如善根亦爾回向一切衆生皆令具足無漏善根菩提之心逮得法智解了分別如無有覺法無有滅法如善根亦爾回向覺悟一切諸法於一念頃皆悉充滿無量法界如過去非同未來非故現在非異如善根亦爾回向發起新新菩提心願除滅生死清淨衆生如三世中不取虛妄如善根亦爾回向過去未來皆悉清淨現在念念現成正覺如一切諸佛菩薩具足如善根亦爾回向一切衆生具足佛智大願方便如常淨無染污如善根亦爾回向一切衆生悉除煩惱一切種智清淨滿足菩薩摩訶薩如是回向時等一切佛剎淨一切世界故等一切世間轉不可壞清淨法輪故等一切菩薩出生一切智願故等觀諸佛無有二故等觀諸法不壞自性故等觀三世巧方便智解語言道故一切菩薩行等所種善根悉能回向故知一切時隨時修習不捨佛事故一切業報平等不著世間出生離世善根故神力自在與諸佛等隨順世間等現佛事故佛子是名菩薩摩訶薩第八如相回向菩薩摩訶薩安住此回向得無量無邊清淨法門為人中雄而無所畏大師子吼成就無量無數菩薩於一切時未曾休息得佛無量無邊滿足身一身充滿一切世界得佛無量無邊滿足音聲發一音聲一切衆生無不聞者得佛無量無邊滿足力於一毛道安置一切世界得佛無量無邊滿足自在神力置一切衆生於一微塵得一切佛無量無邊滿足解脫於一衆生身中現一切佛剎一切如來成最正覺得一切佛無量無數滿足三昧正受善方便力於一三昧中悉能出生一切三昧得一切佛無量無邊滿足辨才説一句法盡未來劫而不窮盡悉除一切衆生疑惑得一切佛無量無邊滿足勝衆生法示現一切衆生薩婆若十力等覺佛子是為菩薩摩訶薩以一切善根隨順如相回向爾時金剛幢菩薩承佛神力普觀十方以偈頌曰菩薩心安住離癡常正念忍辱離惱害修集無量德其心無嫌恨正直常清淨諸業莊飾世悉能善分別菩薩思惟業種種無有量若益衆生業修習常履行善能順世間普令一切喜隨應衆生業菩薩分別行永離諸恚礙知法亦知義安住調御地饒益一切衆覺悟諸善法無量不可數悉能分別知回向益衆生以此深方便具足諸地智滅除衆煩惱如如善回向普攝一切趣安住如實法如是業回向悉令無所著深樂至處道修習真如法無性無所有明德者回向日夜及半月一月年數劫一切皆悉如功德亦如是如世及諸剎衆生一切法趣非趣如實回向悉無餘如如性如實思惟如是性諸功德回向悉皆順真如如如性如是諸法無所有如如離自性智者業回向如諸相如實諸生亦如是如如自性實諸業亦如是如如無有量一切業如是無縛亦無解諸業悉清淨如是真佛子安住不可動成就智慧力入佛方便藏覺悟法王法無縛亦無著無礙無轉心亦復無所轉法身所攝業隨順衆生相深入真實相相亦非是相如是不思議思議不可盡深入不思議思非思寂滅如是思惟法分別一切業除滅諸煩惱是名功德王菩薩一切報無盡智所印盡法無盡性無盡方便滅心不在內外心亦無所有妄取故有法不取則寂滅佛子如是知法空無自性諸法無自在最勝覺無我如如等衆生覺法性如是彼見不思議無相智不惑如是深修習一向求菩提所願不退轉饒益衆生故菩薩捨此身無死虛妄想解了心如化調伏一切衆觀彼順正念世間業報起菩薩悉救護三界無有餘了知衆想行皆悉是虛妄菩薩知非實亦不壞法性彼如是回向智慧妙善根憐愍一切衆令入深方便佛子何等為菩薩摩訶薩第九無縛無著解脫心回向此菩薩摩訶薩於一切善根不生輕心不輕出生死心不輕攝善根心不輕專求一切善根心不輕悔過心不輕隨喜善根心不輕禮他方佛心不輕恭敬合掌業心不輕禮拜塔廟尊重業心不輕勸請他方諸佛轉法輪業心菩薩摩訶薩常樂攝受彼諸善根堅固不壞彼善根安住彼善根思惟彼善根長養彼善根不著彼善根具正直心具彼善根不選擇彼善根隨順彼諸佛境界善根見彼善根得自在力菩薩摩訶薩以無縛無著解脫心彼善根回向具足普賢身口意業以無縛無著解脫心修習普賢勇猛精進以無縛無著解脫心具足普賢無礙音聲陀羅尼門充滿十方以無縛無著解脫心具足普賢得見一切佛諸陀羅尼以無縛無著解脫心具足普賢妙音陀羅尼分別一切音聲悉能演説無量法雲以無縛無著解脫心得持普賢一切劫行陀羅尼於一切世界具足修習諸菩薩行以無縛無著解脫心於一衆生身盡未來劫示現普賢菩薩一切自在神力如一衆生身一切衆生身亦復如是以無縛無著解脫心悉得普賢自在神力示現現在一切諸佛菩薩衆中修菩薩行以無縛無著解脫心得普賢一法門於無量無數劫示現諸佛無盡自在悉能度脫一切衆生以無縛無著解脫心得普賢種種法門自在於無量無數劫示現諸佛無盡自在悉能度脫一切衆生以無縛無著解脫心得普賢自在於念念中令無量衆生安住十力心無厭足以無縛無著解脫心得普賢菩薩自在於一切衆生身皆悉得見諸佛自在修普賢行以無縛無著解脫心得普賢自在於一言中悉能分別一切衆生音聲語言調伏一切衆生安住薩婆若地以無縛無著解脫心得普賢自在於一衆生身中悉能容受一切衆生彼悉自謂逮得佛身以無縛無著解脫心得普賢自在於一華中令一切嚴淨世界皆悉安住菩薩摩訶薩復作是念以此無縛無著解脫心善根出生普賢微妙音聲充滿法界十方佛剎隨其所應皆悉得聞以此普賢無縛無著解脫心善根如普賢於念念中見盡過去際無量無邊世界諸佛聞所説法受持不忘莊嚴佛家以此無縛無著解脫心善根如普賢盡未來劫於一切世界中演説諸法皆悉究竟以此無縛無著解脫心善根於一切世界成最正覺出興于世以此無縛無著解脫心善根能以一光普照虛空等一切世界修習普賢菩薩所行以此無縛無著解脫心善根得無量無邊智慧皆能隨順諸地神通成就普賢菩薩所行以此無縛無著解脫心善根悉得究竟如來智慧於一切劫説如來智諸劫悉盡而智無窮盡具足普賢菩薩所行以此無縛無著解脫心善根於法界等一切如來菩薩所行悉能修習身口意業而無懈怠猶如普賢以此無縛無著解脫心善根得一切佛無上菩提義身不違法身辭辨淨地而不可壞樂説辨才無盡之藏調伏一切衆生具普賢願以此無縛無著解脫心善根入一一法門普照無量不可思議世界於一切法門盡其原底修習普賢菩薩所行逮得究竟薩婆若地以此無縛無著解脫心善根於一一境界中悉以一切種智分別了知一切種智猶無窮盡究竟普賢莊嚴彼岸修菩薩行具足成就方便大王以此無縛無著解脫心善根從此生盡未來際生具足普賢菩薩所行及一切種智離癡法王以此無縛無著解脫心善根得無礙法明普照一切諸菩薩行常修正業具足普賢自在方便以此無縛無著解脫心善根悉得無量方便不可思議方便菩薩方便一切智方便調伏菩薩方便轉無量法輪方便不可説不可説時方便種種説法方便無分際無畏方便説一切法無餘方便得如是等一切隨順方便智修習普賢菩薩所行以此無縛無著解脫心善根具足身業令一切衆生皆悉歡喜得菩薩不退轉清淨善根究竟安住普賢諸業以此無縛無著解脫心善根得清淨智悉能分別衆生語言一切口業清淨莊嚴音辭微妙言無能及修習受持普賢所行以此無縛無著解脫心善根悉能分別一切佛剎一切衆生一切諸法一切莊嚴其心清淨出生一切如來法藏究竟一切智善能隨順普賢所行以此無縛無著解脫心善根清淨直心得一切佛無礙法身具足解脫修如來法攝佛功德住佛境界大智普照修習菩薩清淨之行隨順方便悉能分別一切法藏出生無量大乘自在悉能示現無量無邊一切衆生無上大道具足普賢行願回向以此無縛無著解脫心善根得明利根善調伏根於一切法自在根無窮盡根修習一切善根根一切佛境界平等根授一切菩薩不退轉記大精進根分別一切佛法金剛界根一切如來智慧光照金剛焰根分別一切諸根自在根令一切衆生安住一切智根無量根滿足一切根無礙清淨根平等修習諸願根以此無縛無著解脫心善根得一切菩薩神力住持無量身神力無量智慧境界神力不離一處悉能示現一切佛剎神力菩薩無礙不可制持自在神力示現攝取一切佛剎安置一處自在神力一身充滿一切佛剎自在神力菩薩無礙解脫自在神力少方便一念自在神力依無所有自在神力以一毛悉縛無量世界悉持遊行法界等佛剎示現衆生令得究竟妙智慧門自在神力修習普賢菩薩所行以此無縛無著解脫心善根於一念頃悉能往詣無量佛剎於一身中悉能容受無量佛剎逮得甚深微妙智地善能分別諸佛世界得無生心悉入普賢菩薩法門生菩薩行以此無縛無著解脫心善根生如來家修菩薩行具足無量無數不思議法無量大願皆悉成滿分別一切法界及三世法界而無懈怠隨順普賢菩薩諸行究竟智界以此無縛無著解脫心善根於一毛道分別無量無數佛剎悉能包容一切法界究竟空界如一毛道一切法界虛空界等一切毛道亦復如是以普賢菩薩清淨法門開智慧眼以此無縛無著解脫心善根能以無量無數阿僧祇劫以為一念能以一切衆生諸念以為一念此諸方便皆由普賢菩薩深心究竟以此無縛無著解脫心善根於一身內悉能容受無量諸身如一身一切身亦復如是具足普賢菩薩回向以此無縛無著解脫心善根悉入一切諸佛境界常見諸佛虛空界等清淨法身相好莊嚴神力自在梵音微妙具足廣説無礙正法聞彼佛法悉能受持於彼佛身了無所有悉得普賢菩薩無量大願永離衆生心想見倒以此無縛無著解脫心善根入一切世界入翻覆世界入伏世界於一念中悉能遍入十方世界一切佛剎分別因那網世界分別一切平等法界令雜世界悉為一形無量種種世界無量方便入深法界皆如虛空而亦不壞世界之性修普賢行住菩薩地以此無縛無著解脫心善根悉能分別一切諸想衆生想法想佛剎想方想佛想世想業想行想解脫想根想時想受持想煩惱想清淨想成熟想見諸佛想轉法輪想聞法解想調伏想種種方便出生想種種地想入菩薩想修習菩薩功德想菩薩三昧正受想菩薩三昧起想菩薩境界想劫成壞想明想暗想晝想夜想半月一月年歲時變想去想來想坐想立想覺想睡想如是等一切諸想於一念中悉能了知心無虛妄悉離諸想心無所著遠離障礙一切如來智慧充滿一切佛法長養善根以一切佛身以熏其身常為諸佛之所攝取於白淨法未曾退失善能修學等正覺法究竟彼岸修行諸佛普賢所行具足諸願受如來記於一念中得入方便地究竟智滿足安住以此無縛無著解脫心善根以一一心觀無量心離諸虛妄而無所依心不一故所行各異業相不同令一切衆生勇猛精進出生普賢智慧之寶猶如普賢以此無縛無著解脫心善根於一處悉能分別無量諸處如一處一切處亦復如是悉決定知滿足普賢大願智寶
