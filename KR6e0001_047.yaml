樹常出妙香尼拘律樹閻浮檀樹雨甘香果優鉢羅鉢曇摩分陀利華以為莊嚴爾時善財見彼仙人在此林中服樹皮衣縈髮草坐一萬仙人以為眷屬如栴檀林栴檀圍繞往詣其所五體敬禮念善知識能開導我薩婆若門念善知識現真實道念善知識能安置我一切智地念善知識然智寶燈明淨慧光長養十力智慧光明善知識道即一切智無盡之藏善知識為燈照一切智境界故善知識為橋度生死故善知識為蓋生大慈力覆一切故善知識為不虛照一切法真實相故善知識為海潮滿足大悲故作是念已繞無數匝合掌而立白言大聖我已先發阿耨多羅三藐三菩提心而未知菩薩云何學菩薩行修菩薩道時彼仙人觀察大衆而作是言汝等當知此童子者已發阿耨多羅三藐三菩提心請一切衆生普施無畏饒益一切衆生向深智海欲飲一切諸佛法雨欲盡一切法海源底欲成世間智慧大海欲興大悲重雲欲雨甘露法雨欲出世間明淨智月欲滅世間諸煩惱暗欲長養一切衆生善根爾時大衆各持種種金色妙華香可悅樂散童子上頭面禮足曲躬敬繞作如是言此童子者悉能救護一切衆生滅三惡道離閻羅趣一切諸難消竭欲海除滅苦陰捨愚癡暗斷貪愛縛能升功德金剛圍山建立世間智慧須彌於世間出明淨智日顯曜一切善根諸法示導世間明識善惡時彼仙人告大衆言若有能發阿耨多羅三藐三菩提心者得一切智淨一切佛功德之地時彼仙人告善財言善男子我已成就菩薩無壞幢智慧法門善財白言大聖彼法門者境界云何時彼仙人即申右手摩善財頂摩已執善財手即時善財自見其身在於十方十佛世界微塵等佛所見彼諸佛相好莊嚴以阿僧祇寶珍玩之具莊嚴其剎又見彼佛眷屬大海所從聞法悉能受持乃至不失一句一味分別受持正法梵輪受諸法雲入佛大願淨修諸力清淨願行究竟諸功德藏見彼諸佛隨應化度一切衆生見一切佛清淨圓滿大光明網見已隨順無礙智慧光明究竟佛力或自見身於一佛所一日一夜或復自見於餘佛所七日七夜如是次第於餘佛所或有半月一月一歲百歲千歲或百千歲百千億歲或百億那由他歲或半劫一劫百劫千劫百千劫或百億那由他劫乃至不可說不可說那由他劫或閻浮提微塵等劫乃至不可說不可說世界微塵等劫爾時善財為無壞幢智慧法門照故得明淨藏三昧無盡法門三昧照故得遊一切方陀羅尼光明金剛圓滿光明法門照故得分別智意樓閣三昧住平地莊嚴法藏般若波羅蜜精進照故得佛虛空藏三昧光明一切諸佛法輪三昧光明相照故得三世圓滿智無盡光明時彼仙人放善財手爾時善財即自見身還在本處時彼仙人問善財言汝憶念耶答言唯然大聖善知識力故善男子我唯知此菩薩無壞幢智慧法門我豈能知大菩薩行諸大菩薩皆得一切衆生自在三昧於一切時輪而得自在出生諸佛無盡智慧證一切佛嚴淨慧燈於一念中了三世事於一切世間現淨慧身充滿法界隨衆生所應悉現其前了知一切衆生所行圓滿清淨悉可愛樂我豈能知大菩薩行妙功德願嚴淨佛剎善察論機智慧境界甚深三昧神力自在解脫境界遊戲神通法身音聲究竟智慧如是等事非我境界善男子於此南方有一國土名曰進求有婆羅門名方便命汝詣彼問云何菩薩向菩薩道修菩薩道時善財童子歡喜無量恭敬禮已繞無數匝瞻仰觀察辭退南行爾時善財童子為無壞幢智慧法門所照決了諸佛不可思議自在神力善知菩薩不可思議法門又不可思議菩薩三昧智慧以照其心得一切時三昧光明得一切相三昧境界光明得明淨智令一切衆生得勝妙處得一切至處道法門隨順世間行心無有二以明淨智普照境界得一切聲聞明淨忍藏得無生忍知法實相常行菩薩行不捨菩薩心增長薩婆若心得十力明普照一切樂妙法音心無厭足如說修行住薩婆若究竟一切智境界出生無量菩薩莊嚴心滿足菩薩清淨大願於一念頃遍至一切諸佛剎網教化成熟無量衆生海心無懈倦悉見菩薩無量行境界悉分別見一切世間見諸佛剎種種莊嚴於微細境界悉能安置無量世界又能見彼種種莊嚴悉能分別無量世界諸語言法又知無量衆生欲樂知諸衆生無量所行以無量方便教化衆生善知殊方隨其所應化度衆生念善知識漸漸遊行至進求國周遍推求彼婆羅門時婆羅門修諸苦行求一切智四面火聚猶如大山中有刀山高峻無極從彼山上自投火聚爾時善財詣婆羅門頭面禮足合掌而立白言大聖我已先發阿耨多羅三藐三菩提心而未知菩薩云何學菩薩行修菩薩道願為我說答言善男子汝今若能登此刀山投火聚者菩薩諸行皆悉清淨爾時善財作如是念得人身難離諸難難得無難難得淨法難值佛世難具諸根難聞佛法難遇善知識難得與同止難得聞正教難得正命難順趣正法難此將非魔魔所使耶非善知識而現善知識相將非惡菩薩耶而今為我作壽命難作善根難薩婆若難此非正教險惡道耳遠離法門薩婆若等一切佛法作是念時十萬梵天在虛空中作如是言善男子莫作是念莫作是念此是大聖具足金剛智慧光明精進不退悉已究竟一切境界欲竭一切衆生貪愛大海欲裂一切諸邪見網欲燒一切衆生煩惱除滅愚暗普照一切令一切衆生離生死險難除滅三世愚癡暗冥放淨光明普照一切時諸梵天及自在天衆生主天等諸邪見天作如是言我造衆生我為一切世間最勝我為最上我為第一是諸天等見婆羅門修大苦行五熱炙身見如是已各於諸禪不得滋味來詣其所時婆羅門以自在力而為說法令滅邪見捨離我心發大慈悲普覆衆生長養菩提正直之心開四種道求佛法身隨所應化悉能示現佛微妙音一切悉聞無有障礙復有一萬魔在虛空中以種種摩尼寶華散婆羅門告善財言善男子此婆羅門苦行力故放大光明令我宮殿諸莊嚴具悉如聚墨我不復樂即與無量諸天天女眷屬圍繞來詣其所為我說法悉於阿耨多羅三藐三菩提得不退轉復有一萬他化自在天在虛空中各持天華恭敬供養作如是言善男子此婆羅門苦行力故放大光明令我宮殿諸莊嚴具悉如聚墨我不復樂即與眷屬來詣其所為我說法令我於心而得自在於煩惱中而得自在於受生中而得自在除滅障礙而得自在於一切三昧而得自在於莊嚴具而得自在於壽命中而得自在乃至令我於一切佛法而得自在復有一萬化自在天在虛空中以天妓樂恭敬供養作如是言善男子此婆羅門五熱炙身放大光明照我宮殿及莊嚴具照已悉令我等不樂五欲不求欲樂身心柔軟與眷屬俱來詣其所為我說法淨心明淨心善奇特心柔軟心歡喜心乃至逮得清淨十力長養離生出生無量清淨之身乃至得佛清淨法身得清淨口微妙音聲遍至一切無所障礙乃至得一切智復有一萬兜率陀天與其眷屬在虛空中雨一切末香雲恭敬供養作如是言善男子此婆羅門五熱炙身時我自於宮殿不樂須臾來詣其所為我解說無著之法少欲知足長養善根發菩提心乃至究竟一切佛法復有一萬諸天三十三天及阿修羅與眷屬俱在虛空中雨曼陀羅華雲摩訶曼陀羅華雲恭敬供養作如是言善男子此婆羅門五熱炙身時我於天樂不須臾樂著來詣其所為我說法遠離欲樂乃至為我說無常法變易不住斷除一切放逸高慢長養發起菩提之心又善男子我見此婆羅門時須彌山頂六種震動我於爾時心大恐怖專求一切智復有一萬大龍王伊那槃那難陀跋難陀等興黑栴檀香雲諸龍王女出妙樂音雨天華雲天香水雲恭敬供養作如是言善男子此婆羅門五熱炙身時放大光明普照一切龍王宮殿令諸龍王離熱沙苦金翅鳥怖滅瞋恚熱身體清涼發歡喜心發喜心已而為說法厭惡龍趣至誠悔過除滅業障發阿耨多羅三藐三菩提心乃至住一切智復有一萬夜叉王種種供養此婆羅門及以善財作如是言善男子此婆羅門五熱炙身時我及羅剎鳩槃荼等悉於衆生發大慈心無所嬈害慈心力故不樂宮殿與眷屬俱來詣其所彼婆羅門以大慈心蔭覆我等令我歡喜身心柔軟安隱快樂為我說法乃至令無量夜叉羅剎鳩槃荼等發阿耨多羅三藐三菩提心復有一萬乾闥婆王在虛空中作如是言善男子此婆羅門五熱炙身時放大光明照我宮殿悉令我等得不思議樂來詣其所為我說法乃至令發阿耨多羅三藐三菩提心得不退轉復有一萬阿修羅王在虛空中右膝䠒跪一心合掌恭敬供養作如是言善男子此婆羅門五熱炙身時一切阿修羅宮殿大地大海皆悉震動我等爾時除滅高心來詣其所為我說法遠離一切諂曲幻心得深法忍安住不動具足十力復有一萬迦樓羅王勇力持等化為外道童子在虛空中作如是言乃至為我說法安立大慈讚歎大悲度生死海沒於五欲泥者歎淨直心門生慧方便翅隨其所應皆悉化度復有一萬緊那羅王在虛空中作如是言善男子此婆羅門五熱炙身時於我寶多羅樹中金鈴網中寶瓔珞中諸寶樹中種種樂器中自然演出微妙音聲佛聲法聲比丘僧聲不退轉諸菩薩聲菩提心聲某方某國有某菩薩發菩提心修行苦行修大布施莊嚴道場往詣道場成正覺聲善男子我聞是聲即大歡喜來詣其所為我說法令無量衆生於阿耨多羅三藐三菩提得不退轉復有無量欲界諸天在虛空中供養恭敬作如是言善男子此婆羅門五熱炙身時放大光明乃至普照阿鼻地獄除滅苦痛若有衆生見斯光者命終生天知報恩故捨五欲樂來詣其所樂觀無厭為我說法乃至令無量衆生發菩提心爾時善財童子聞奇特法心大歡喜於婆羅門所發起真實善知識心頭面禮足如是白言向疑聖教違知識教唯願大聖受我悔過時婆羅門為善財童子而說偈言欲求菩提者當順知識教除滅諸疑惑一心常恭敬修習於正道知法真實相安住於道場成就佛菩提爾時善財童子即登刀山自投火聚未至中間即得菩薩安住三昧既至火焰復得菩薩寂靜安樂照明三昧得三昧已白言甚奇大聖如是刀山及大火聚我身觸時安隱快樂時婆羅門告善財言善男子我唯成此菩薩無盡法門明淨法王諸菩薩行滿足諸願悉滅衆生煩惱邪見得不退轉不可盡心離懈怠心一切無畏得金剛那羅延藏究竟大境界無有疲倦遠離諸垢不動如風輪精進不退以大莊嚴而自莊嚴饒益衆生如是法門我當云何能知能說善男子於此南方有城名師子奮迅有一童女名彌多羅尼汝詣彼問云何菩薩學菩薩行修菩薩道時善財童子頭面禮足繞無數匝觀察無厭辭退南行
