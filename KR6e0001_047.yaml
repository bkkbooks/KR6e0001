body:
  text: 東晉天竺三藏佛馱跋陀羅譯入法界品第三十四之四爾時善財童子正念思惟解脫長者教念不可思議菩薩法門思惟不可思議菩薩慧光隨順深入不可思議甚深法界攝取菩薩不可思議淨妙功德顯現如來不可思議自在神力解了不可思議莊嚴佛剎分別知佛不可思議住持莊嚴安住境界思惟不可思議菩薩境界三昧莊嚴分別不可思議世界究竟無礙向不可思議菩薩堅固淨業深心受持不可思議淨業諸願漸趣南方至莊嚴閻浮提頂國周遍推求海幢比丘見在靜處結跏趺坐三昧正受滅出入息身安不動寂然無覺從其足下出阿僧祇長者阿僧祇婆羅門皆悉頂冠衆寶天冠各齎妙寶上味飲食一切寶衣香華寶鬘末香塗香資生之具攝諸貧窮安慰撫接雨衆寶物令一切衆生皆大歡喜充滿十方從其兩膝出剎利婆羅門皆悉聰慧形色威儀服飾莊嚴皆悉不同以微妙音訓導衆生離惡修善住真實義說四攝法令衆生歡喜充滿十方從腰兩邊出一切衆生數等五通仙人或服草衣或樹皮衣皆執澡瓶持三奇杖威儀庠序無有變異遊行虛空讚歎三寶為衆生說清淨梵行調伏諸根演真實義攝取世間令諸衆生入智慧海又復演說世間諸論令次第住一切善根充滿十方從其兩脅出不可思議龍不可思議龍女顯現不可思議諸龍自在攝取衆生雨不可思議香莊嚴雲華莊嚴雲鬘莊嚴雲寶蓋莊嚴雲寶幡莊嚴雲衆寶莊嚴雲無價摩尼寶莊嚴雲寶瓔珞莊嚴雲寶座莊嚴雲寶宮殿莊嚴雲寶蓮華莊嚴雲寶冠莊嚴雲天形像莊嚴雲天女莊嚴雲雨如是等雲各不可思議普照十方一切世界而以供養一切如來普令衆生皆大歡喜充滿法界從胸德字出無量阿僧祇阿修羅王示現阿修羅王不可思議自在神力震動一切諸大海水及百千世界令諸山王皆相衝擊震動一切諸天宮殿映蔽一切諸魔光明悉如聚墨降伏一切諸魔軍衆除滅衆生放逸高慢離怒害心滅不善法壞煩惱山棄捨戰諍又以神力覺悟衆生厭離諸惡永絶生死不著諸趣普令衆生常樂寂滅住菩提心淨菩薩行住諸波羅蜜究竟菩薩地照一切法普照諸佛方便之法充滿法界從其背出阿僧祇聲聞緣覺應以二乘化衆生故著我見者教不淨觀貪欲多者教慈心觀瞋恚多者教緣起觀愚癡多者教方便智觀察諸法為等分者說無著法著境界者說妙願境界樂寂滅者教入諸趣饒益衆生充滿法界從其兩肩出阿僧祇諸夜叉王諸羅剎王種種惡身長短形色乘種種乘各與其衆而自圍繞其有衆生能行善者及衆賢聖諸菩薩等若向正道若得果證皆悉防衛而守護之或作金剛力士守護諸佛及佛住處若有衆生遭諸恐怖亦防護之悉令無畏諸疾病者令得除愈諸在難者悉令解脫除滅橫死離諸熱惱教化衆生令得實利壞生死輪讚歎法輪摧外道輪充滿法界從其腹出百千阿僧祇緊那羅王各與百千阿僧祇阿僧祇緊那羅女眷屬圍繞出百千阿僧祇乾闥婆王各與百千阿僧祇阿僧祇乾闥婆女眷屬圍繞出百千阿僧祇天娛樂音說實相法讚歎諸佛稱美菩提及菩薩行歎菩提門入法輪門好樂一切自在法門演說一切般涅槃門攝持一切諸佛教門歡喜一切衆生之門嚴淨一切諸佛剎門講說一切諸法界門除滅一切諸障礙門宣明一切諸善根門充滿法界從其口出百千阿僧祇轉輪聖王七寶具足四兵圍繞放無慳光雨摩尼寶諸貧苦者悉令富樂無財施者令得惠施為諸群生歎離殺盜邪淫之法修習慈心常說愛語饒益衆生除滅妄語遠離惡口攝取衆生遠離兩舌說和合語離無義語說甚深法悉令衆生遠離口過讚歎大悲令衆生歡喜離瞋恚心分別世間一切正法觀察因緣照明真諦拔諸群生邪見毒刺除滅疑惑離一切障明法實義充滿法界從其兩目出百千阿僧祇日普照十方滅一切暗悉令衆生除滅垢曀遠離一切惡道苦毒令寒者得溫於垢濁佛剎放明淨光廣說乃至普照金銀琉璃等一切世界及衆生類除滅衆生心之重暗悉令歡喜能辨衆生無量事業莊嚴一切世界妙法境界充滿法界從其眉間出百千阿僧祇天王帝釋無量雜寶以為莊嚴持釋王法普照一切諸天宮殿震動一切須彌山王悉令諸天於天境界生厭離心歎功德力明智慧力起直心力長深心力嚴淨念力堅固菩提心遠離欲樂讚歎樂見一切諸佛不歎樂境界樂歎聞法樂離世間樂觀察諸法智慧之樂離阿修羅戰鬪恐怖滅煩惱軍遠離死畏願降衆魔興妙法山說須彌山等廣大法句能辨衆生無量事業充滿法界從其額上出無量梵天妙色端嚴世界無倫威儀庠序演出妙音讚歎諸佛勸請說法令衆生歡喜乃至能辨衆生無量事業充滿法界從其頭上出阿僧祇諸菩薩衆種種形色相好嚴身放無量光網現檀波羅蜜讚歎布施遠離慳吝無所貪著莊嚴一切世界稱揚淨戒遠離惡戒安立衆生菩薩律儀歎大乘戒出生大悲功德之藏說一切有皆悉如夢說五欲樂無有滋味安立衆生離煩惱法稱揚讚歎金色身業讚歎慈心遠離殺害滅畜生趣歎多聞力安立衆生於忍辱力歎普照自在遠離放逸安立衆生於不放逸歎禪波羅蜜心得自在拔邪見刺讚歎正見般若波羅蜜樂智自在歎隨世間遠離生死而於諸趣自在受生歎願力滿足出諸通明自在壽命讚歎一切陀羅尼力出生願力淨三昧力現自在生讚歎智慧普照一切衆生諸根分別演說諸心心行照十力智讚歎自在薩婆若充滿法界從其頂上出百千阿僧祇佛身分具足相好莊嚴猶如金山普照一切出妙音聲充滿法界顯現無量無邊神力自在普雨一切甘露法雲為坐道場菩薩雨平等法雲為灌頂菩薩雨普門法雲為深忍菩薩雨普莊嚴法雲為童真菩薩雨堅固山法雲為不退菩薩雨海藏法雲為成就直心菩薩雨普境界法雲為方便道菩薩雨自性地音聲法雲為生貴菩薩雨隨順世間法雲為修行菩薩雨厭離法雲為治地菩薩雨長養法藏法雲為初發心菩薩雨精進法雲為信行者雨無盡門法雲為色界衆生雨無盡平等法雲為大梵天雨普藏法雲為大自在天雨生力法雲為魔天王雨心幢法雲為化樂天雨淨念法雲為兜率天雨淨意法雲為夜摩天雨歡喜法雲為帝釋天雨莊嚴虛空法雲為夜叉王雨歡喜法雲為乾闥婆王雨自在圓滿法雲為阿修羅王雨大境界法雲為迦樓羅王雨無量世界法雲為緊那羅王雨饒益衆生勝智法雲為諸人王雨不可樂法雲為諸龍王雨歡喜幢法雲為摩睺羅伽王雨寂靜法雲為地獄衆生雨不亂念莊嚴法雲為諸畜生雨智慧法雲為閻羅王處雨無畏法雲為餓鬼處雨正希望法雲悉令衆生向賢聖門充滿法界彼諸如來一一毛孔各放阿僧祇淨光明網阿僧祇妙色阿僧祇莊嚴阿僧祇境界辨阿僧祇事充滿十方爾時善財一心觀察海幢比丘念彼三昧法門思惟不可思議菩薩境界思惟無量無作現在莊嚴普門法門觀察法界莊嚴智慧依佛智住出菩薩力建菩薩願力增廣菩薩諸行如是正立觀察一日一夜乃至七日七夜半月一月乃至六月六日過此以後海幢比丘從三昧起爾時善財歎未曾有合掌白言甚奇大聖如此三昧最為甚深如此三昧最為廣大如此三昧境界無量如此三昧不可思議神力自在如此三昧不可稱量如此三昧慧光明淨如此三昧阿僧祇莊嚴以為莊嚴如此三昧境界不可壞如此三昧無有退轉如此三昧普照十方一切世界如此三昧具有無量義趣方便大聖其有菩薩入此三昧能為一切除滅衆苦永絶地獄餓鬼畜生一切楚毒遠離諸難令天人趣悉得寂靜令衆生歡喜常樂甚深禪定境界厭離有為超出三界發菩提心長養智慧功德因緣長養彌廣無上大悲生大願力照菩薩道智慧莊嚴大波羅蜜究竟出生大乘境界智慧遍照普賢所行得菩薩諸地智慧光明具一切菩薩清淨願行證一切智境大聖此三昧者名為何等善男子此三昧名普眼捨得又名清淨光明般若波羅蜜境界又名清淨莊嚴普門善男子修習般若波羅蜜故得此三昧得此三昧時即得百萬阿僧祇三昧大聖此三昧唯有此功德境界復有餘耶善男子此三昧者分別一切世界無所障礙究竟一切世界無所障礙遊行一切世界無所障礙莊嚴一切世界無所障礙修治一切世界無所障礙嚴淨一切世界無所障礙見一切佛無所障礙觀一切佛功德無所障礙知一切佛自在神力無所障礙究竟一切佛力無所障礙度一切佛功德大海無所障礙雨一切佛淨妙法雲無所障礙度一切佛法無所障礙得一切佛轉法輪智不可破壞無所障礙得一切佛清淨大衆海之源底無所障礙隨順普入十方世界無所障礙隨順觀察十方佛法無所障礙大悲攝取十方衆生無所障礙大慈充滿十方世界無所障礙見十方佛心無厭足無所障礙隨順遍入衆生大海無所障礙了知衆生一切根海無所障礙分別一切諸衆生海無所障礙善男子我唯知此清淨光明般若波羅蜜三昧法門云何能說諸大菩薩究竟之行諸大菩薩皆悉深入智慧大海善能分別清淨法界智慧究竟一切法趣慧光無量充滿一切得大陀羅尼自在光明一切三昧圓滿清淨出生一切自在通明深入一切無盡辨海雷震一切諸地音聲悉能救護一切衆生我尚不能說彼所行況其功德顯其境界說其境界照其法門明其積聚諸功德藏說其正道諸三昧流平等智慧善男子於此南方有一住處名曰海潮彼有園林名普莊嚴有優婆夷名曰休捨汝詣彼問云何菩薩修菩薩道淨菩薩道時善財童子歡喜無量於海幢比丘所不堅固中而得堅固於不實中而得真實究竟功德妙藏境界得明淨智普照一切逮得甚深三昧光明到淨解脫方便觀察一切世界淨諸法門明淨智慧普照十方頭面禮足繞無數匝眷仰觀察辭退南行爾時善財童子正念思惟海幢比丘心未曾捨樂見無厭顧戀聖音目想慈顏正念思惟其心境界三昧境界願行境界正念思惟明淨智慧敬善知識向善知識念善知識教於善知識起愛恭敬又作是念因善知識得見諸佛善知識者開示顯現一切佛法善知識者是奇特法令人得見諸佛法故善知識者為明淨眼令人見佛如虛空故善知識者為善津濟令人於佛華池得源底故漸漸南行至海潮處見普莊嚴園林七寶垣牆周匝圍繞諸妙寶樹行列莊嚴一切華樹雨華如雲布散其地香樹芬馨普熏十方鬘樹垂鬘寶樹雨寶遍布莊嚴衆寶衣樹彌覆一切諸音樂樹出微妙音以如是等諸珍玩具而以莊嚴此園林中有一萬講堂衆寶合成一萬樓閣閻浮檀金以覆其上一萬宮殿毗樓遮那寶藏莊嚴一萬浴池衆寶合成七寶欄楯周匝圍繞八功德水湛然盈滿閻浮檀金沙淨水寶珠遍布池底四面寶階端嚴齊正寶多羅樹周匝行列鳧雁鴛鴦孔雀哀鸞異類衆鳥遊戲其中出和雅音覆以金網風自然起出微妙聲設衆寶帳寶樹周遍建阿僧祇殊勝寶幢放大光明照百由旬百萬池沼黑栴檀泥凝積池底生寶蓮華充滿其中從彼蓮華出大光明普照一切彼園林中有大宮殿名莊嚴幢海藏妙寶以為其地琉璃寶柱莊嚴殊妙巍巍高大猶若金山衆生見者無不喜樂有阿僧祇淨摩尼寶普照一切出自然香謂明相香香王香覺悟香等敷衆寶座謂蓮華藏座照諸方藏座明淨藏座衆生悅樂藏座師子藏座離垢寶藏座不思議藏座普門摩尼妙寶藏座光嚴藏座大海藏座金剛師子藏座無量窗牖妙寶莊飾又張一萬衆妙寶帳謂寶衣帳妙寶華帳寶樹枝帳摩尼寶帳金帳莊嚴帳香帳娛樂帳自在龍王帳馬王帳釋天莊嚴寶帳一萬寶網絞絡其上謂金鈴網珍寶蓋網衆寶像網海藏珠網青琉璃摩尼寶網師子吼網月摩尼網香像網衆寶山