body:
  text: 東晉天竺三藏佛馱跋陀羅譯金剛幢菩薩十回向品第二十一之六復次菩薩摩訶薩作無量億那由他阿僧祇大衆施會離惡清淨諸佛所歎普淨衆生永離衆惡淨三業迹生薩婆若無量境界皆悉清淨無量百千億那由他布施之具皆悉莊嚴而以惠施菩薩摩訶薩以大施會所攝善根回向衆生令一切衆生悉得無上菩提之心行無量施皆悉清淨令一切衆生皆悉究竟無量無邊清淨之道令一切衆生行無量慈隨衆所須悉令滿足令一切衆生行無量悲悉能救護一切衆生令一切衆生隨順三世如來正教令佛歡喜令一切衆生於諸佛所修行布施心不中悔令一切衆生皆悉長養勝妙信根於念念中修行增進無量布施令一切衆生得摩訶衍心皆悉成就大乘施會令一切衆生成大善會施究竟施善施勝施隨願施第一施上施無上施無等施出世間施一切諸佛所讚歎施令一切衆生成第一施主於諸惡道拔出衆生安置無礙清淨智道修平等願真實善根得無等等如來智慧令一切衆生安住寂靜諸禪定智趣不死道究竟一切通明智慧勇猛精進具足諸地莊嚴佛法究竟彼岸永不退轉令一切衆生得不退轉大乘之會給施衆生而無休息究竟無上一切種智令一切衆生種諸善根悉到無量功德彼岸令一切衆生諸佛所歎普為一切作大施主功德具足充滿法界普照十方施無上樂令一切衆生悉為平等大布施主究竟善根等攝衆生令一切衆生為勝施主建立一切於無上乘令一切衆生為應時施主悉離非時究竟時會令一切衆生為善施主具大人施法到於彼岸令一切衆生為嚴淨施主至一切佛薩婆若處令一切衆生為一切淨施主出生積聚法界等功德令一切衆生為出過一切施主滿足大願度脫衆生安住如來處非處力是為菩薩摩訶薩大施善根回向令一切衆生行無上捨究竟佛施成就善施不可壞施諸佛法施愛眼心施救衆生施薩婆若施見諸佛施具威儀施具足菩薩所行功德佛智慧施復次菩薩摩訶薩悉捨一切資生之具心無貪著不求果報世間富樂無所希望捨離愚癡深解諸法饒益安立一切衆生真實相心解一切法種種莊嚴諸資生具無量境界種種莊嚴資生之具饒益衆生究竟施一切施內外施增長直心令一切衆生具功德寶心善能饒益無量衆生令一切衆生成就寶心令一切衆生清淨善根等三世佛具一切智菩薩摩訶薩以施資生之具所攝善根回向衆生令一切衆生清淨調伏令一切衆生皆悉嚴淨一切佛剎除滅煩惱令一切衆生以清淨心於念念中充滿法界令一切衆生智慧充滿虛空法界令一切衆生得一切智了達三世於一切時轉不退法輪令一切衆生悉皆示現一切種智巧妙方便饒益衆生令一切衆生悉悟一切諸如來道盡未來劫於一切剎廣説佛法未曾休息令一切衆生於無量劫修菩薩行心無厭倦令一切衆生於一切世界淨世界不淨世界小世界中世界大世界微細世界廣世界翻覆世界伏世界如是等一切世界皆悉嚴淨菩薩充滿行大乘行令一切衆生於念念中悉作三世一切佛事調伏衆生立薩婆若此菩薩摩訶薩以如是等無量阿僧祇劫饒益衆生令佛法不斷以大悲心救護衆生修習大慈具菩薩行建立一切諸如來論令一切衆生皆悉不斷諸佛善根有來求者悉滿其意而無患厭能施一切心無有悔捨一切物資生之具隨所來方無不欣悅於諸衆生如一子想見來求者心大歡喜作是念言是我善知識爾時菩薩長養大悲心歡喜心不可壞心大施心菩薩摩訶薩見來求者隨其所須悉資給之充滿其意令無所乏皆令歡喜斷其貧苦具足富樂同聲稱美歎德而歸菩薩爾時心大歡喜於百千億那由他劫受帝釋樂所不能及須夜摩天王兜率陀天王化自在天王他化自在天王百千億那由他劫所受喜樂所不能及梵天王樂乃至淨居天無量無邊阿僧祇劫禪定快樂亦所不及無量無數不可稱説阿僧祇劫轉輪王樂亦不能及菩薩摩訶薩如是大喜無量信心增長直心清淨諸根柔軟定心增廣生菩提心堅固不轉菩薩摩訶薩善根回向令一切衆生離毒害心令一切衆生安隱快樂令一切衆生得真實義令一切衆生悉得清淨無上菩提令一切衆生悉得平等令一切衆生得賢善心令一切衆生逮得賢善摩訶衍心令一切衆生所行悉善令一切衆生具普賢菩薩所修願行令一切衆生覺十力乘菩薩摩訶薩以此善根回向時於身口意業無著無縛解脫回向無衆生想回向無命想無人想無福伽羅想無男子想無年少想無禪頭想無造想無受想無有想無無想無今世後世想無死此生彼想無有常想無無常想非三有想非無三有想非想非無想無縛無著解脫心回向無業回向無業報回向無虛妄回向無真實回向無思回向無思報回向無心回向無無心回向菩薩摩訶薩如是回向時不著內不著外不著緣不著境界不著因不著因和合不著法不著非法不著思不著思果不著色不著色取不著色滅不著受想行識不著受想行識取不著受想行識滅菩薩摩訶薩若於此法中心不著者則不縛色不縛色取不縛色滅不縛受想行識不縛受想行識取不縛受想行識滅若於此法而不縛者則於諸法亦無有解何以故一切諸法不生不滅無有自性無一無二無多無少無有量無無量無善無惡無深無淺無靜無亂無著無離無法無非法無性無非性無有無無故菩薩如是見法則是非法言語道斷故非法為法而亦不壞一切業迹具修菩薩行不退一切智解知業緣如夢如響如鏡中像一切法如幻而亦不違因緣業報入甚深業解法真實無行無作亦復不違業行之道菩薩摩訶薩以一切善根如是回向一切種智普遊十方教化衆生回向者何義永度世間生死彼岸故説回向度諸陰彼岸故説回向度語言道彼岸故説回向度衆生相彼岸故説回向度身見彼岸故説回向度不堅固彼岸故説回向度諸行彼岸故説回向度諸有彼岸故説回向度諸取彼岸故説回向度諸世間法彼岸故説回向菩薩摩訶薩若能以此善根回向則皆隨順一切諸佛隨順法隨順智隨順菩提隨順義隨順回向隨順行隨順真實隨順清淨菩薩摩訶薩如是回向已令一切衆生得如來法諸佛歡喜無佛不值無法不了於一切法無違無失悉能分別一切佛法不捨正法不違因緣內外諸法法力具足無有休息佛子是為菩薩摩訶薩第六隨順一切堅固善根回向菩薩摩訶薩住此回向無量諸佛皆悉守護得堅固法修一切智解隨順義解一切法隨順真性得一切法隨順堅固善根隨順滿足諸願得隨順堅固法一切金剛所不能壞得隨順堅固願於一切法中而得自在爾時金剛幢菩薩承佛神力觀察十方觀察一切大衆觀察法界深入諸法句味之義修無量心大悲普覆一切衆生覺悟三世如來家法入於一切諸佛功德逮得諸佛自在之身分別一切諸衆生心隨所種善根應受化時隨順法身示現色身以偈頌曰一切世間諸大王菩薩現身於彼生處彼尊豪大王位悉能調伏諸群生其心柔軟常清淨於一切衆得自在常以正法治天下方便隨順樂世間菩薩清淨王家生常能如應轉法輪遠離諸惡正治國十方衆生無違教菩薩色相功德滿具足甚深妙智慧堅固安住不退轉悉能降伏一切魔常能具持清淨戒決定安住忍辱力除滅一切瞋恚毒常能修習最勝法菩薩具行布施法飲食華鬘乘衣服塗香房舍明淨燈如是等施無有量菩薩所施益衆生常能開發廣大心其意清淨大歡喜布施尊勝及世間菩薩悉能捨無量內外所有一切物所行布施常歡喜未曾暫有中悔心菩薩悉能施頭目手足肌肉及骨髓一切身分盡惠施其心未曾生中悔菩薩處在大王位清淨豪貴人中尊大悲以舌施群生楚毒無量不中悔菩薩施舌淨善根回向一切諸群生悉令此等衆生類具足成就廣長舌菩薩歡喜施妻子其心未曾生憂悔又復欣悅施國土亦能捨身無所吝隨所樂求盡施與應時惠施無嫌恨一切所有能悉捨諸來求者皆滿足為法捨身無央數修諸苦行求菩提又為衆生受諸苦求無上智不退轉聽受如來正法故以身布施無疲厭內心歡喜無有量救護一切衆生故菩薩得見諸佛已慈心恭敬設供養饒益歡喜悉具足皆能聞持諸佛法回向一切衆生類悉令世間得安樂普能救護一切衆永使究竟得解脫菩薩具足諸眷屬色身端嚴順教命妙莊嚴具為校飾聰睿仁賢巧智慧以饒益故悉布施而未曾有微吝心不為世間資生利饒益衆生求菩提具足修習淨功德履行無量諸勝業回向一切衆生類亦不取業堅固相菩薩能捨大王位嚴飾京都諸城邑宮殿內外一切物遊觀園林諸池流無量無數百千劫以無上心行布施開悟世間示彼岸隨順化導群生類菩薩見有來求者悉從他方世界至隨彼所須滿其願菩薩大喜充遍身菩薩回向施功德三世一切諸如來所學究竟到彼岸無上導師之境界菩薩觀察一切法誰為度脫衆生者為度脫誰至何處解空不捨布施心菩薩回向智慧故菩薩回向求正法菩薩回向甚深義於一切法無所著心不分別一切業於諸業報不染著了達菩提從緣起於法真性無所壞解了己身不染著其心寂滅無所依智慧分別無業性善解因緣非無業不虛妄取過去法亦復不取未來法了達現在無所有觀察三世悉空寂菩薩究竟色彼岸受想行識亦如是永度一切到彼岸其心謙順常清淨觀察五陰十八界分別諸入及己身於此諸法求菩提皆悉空寂不可得不取諸法常住相於斷滅相亦不受一切諸法非有無諸業因緣和合生無有衆生得菩提一切諸法悉寂滅心不染著諸佛剎了達三世無所有若能如是解正法亦如一切諸最勝雖復推求無所得菩薩所行亦不虛是故緣中求諸法不違一切因緣道分別解説諸業迹欲令衆生悉清淨是為智者所修行一切諸佛之所説隨順思惟入正義自然覺悟無上道諸法無生亦無滅亦復無來亦無去不於此死而彼生深解一切諸佛法了達諸法真實性於法性中無所著永離諸法虛妄相彼人得見諸佛智分別解了諸法趣衆生諸趣佛國趣一切三世所有法皆悉了知無有餘三世諸佛所覺法悉能具足聞受持所説三世一切法如是等法悉非法隨順修行一切法而亦不壞諸法相菩薩回向諸衆生令彼疾得一切智佛子何等為菩薩摩訶薩第七等心隨順一切衆生回向佛子此菩薩摩訶薩增長下品善根中品善根上品善根無量善根廣善根種種善根不可測量善根不可思議善根阿僧祇善根無邊善根佛境界善根法境界善根僧境界善根善知識境界善根一切衆生境界善根方便境界善根修習微妙境界善根內境界善根外境界善根無量別異功德境界善根修習一切施境界善根清淨戒境界善根菩薩內自專正於一切捨忍辱境界善根精進不退轉境界善根入種種禪定境界善根修行諸地智慧境界善根分別一切衆生心心境界善根積集無量清淨功德善根修習正念菩薩業境界善根普覆一切衆生境界善根菩薩摩訶薩行如是等無量善根修習究竟積集長養廣開解已則能安住忍力閉惡趣門善調諸根威儀具足永離顛倒決定正趣堪為一切諸佛法器普為衆生作無上福田常為諸佛之所守護出生長養一切諸佛清淨善根隨順具滿如來大願深樂佛業心得自在悉與三世諸如來等普能供養一切諸佛究竟一切諸如來力常為諸佛之所讚歎不求生天不貪利養不著諸行一切善根皆悉回向為一切衆生作功德藏具足諸道普覆一切於生死中拔出衆生教令修習一切善根回向一切境界而不斷絶開一切智菩提之門建立智幢嚴淨大道普示衆生捨離