body:
  text: 東晉天竺三藏佛馱跋陀羅譯入法界品第三十四之二爾時壞散一切衆魔智幢王菩薩承佛神力觀察十方以偈頌曰大智無礙身非身難思議如來淨法身一切莫能測不思議行業起此清淨身無量妙莊嚴不染於三界普明照一切清淨諸法界開發菩提門出生深定智永離諸垢染除滅一切障世間明淨日普放慧光明永絶生死流悉令三界淨具足菩薩德成就佛菩提顯現無量色於彼無所染所可現衆色一切莫能思人王勝智慧能於念念中具無量菩提一切莫能知具足無盡智一切莫能壞彼於一念中明達三世佛分別一切業正念思菩提於思而非思思法寂滅故甚深不可説遠離語言道如來從此起佛業難思議爾時明淨願智幢王菩薩承佛神力觀察十方以偈頌曰離癡清淨念聞持一切法深慧能分別諸佛無盡海菩薩決定心修習菩薩行出生甚深智除滅諸疑惑其心無疲厭遠離於懈怠常勤修精進究竟諸佛法具足信智慧安住不可動常樂甚深智觀察無所著無量無邊劫積集諸功德專心常回向諸佛甚深法雖在生死中其心無染著安住諸佛法常樂如來行世間諸所有陰界等諸法無畏悉除斷安住佛正法世間顛倒惑生死輪常轉修習無礙行實利益衆生菩薩行難稱一切莫能知除滅一切苦安樂諸群生善覺菩提智普照諸世間除滅愚癡暗度脫一切衆爾時壞散一切障智慧勢王菩薩承佛神力觀察十方以偈頌曰無量無數劫佛音難得聞何況親奉覲除滅諸疑惑如來世間燈究竟一切法無上勝福田令衆悉清淨如來妙色身一切莫能思無量劫諦觀其心無厭足佛子善觀察如來妙色身除滅一切障究竟成菩提如來妙色身出生淨妙音無礙諸辨才廣開菩提門普照一切衆無量難思議建立大乘智授以菩提記功德圓滿日出興照世間長養一切世無量功德身若有值如來遠離諸惡道除滅一切苦具足智慧身若有見如來能發無量心長養無數智值遇諸導師若有見如來得定菩提心能自決定知我必成菩提爾時分別法界智通王菩薩承佛神力觀察十方以偈頌曰菩薩見如來無量淨功德皆悉善回向究竟一切智饒益衆生故如來出世間具足大悲心為世轉法輪一切無能報大仙普慈恩不可思議劫代衆受苦故無量億劫中受諸地獄苦不捨一切衆悉令得見佛普能代衆生具受無量苦其心無疲倦為度一切故一切諸世間所有惡道苦如來常處中悉令聞正法一一地獄住不可思議劫具受無量苦終不離諸佛所以無量劫常在三惡道欲令諸群生長養智慧故衆生見如來除滅諸苦惱安立於大智一切佛境界若有見佛者除滅一切障長養功德藏究竟成菩提如來能除滅世間諸疑惑隨其所應化悉滿彼大願爾時普賢菩薩觀察一切大衆欲重開發顯現照明以法界等方便廣説師子奮迅三昧法界等虛空界等三世等一切衆生界等一切劫等一切業性等衆生希望等衆生欲等法光明等隨時教化等一切衆生根等為諸菩薩十種廣説師子奮迅三昧何等為十所謂廣説一切法界中一切佛剎微塵等佛次第興世演説正法廣説虛空界等一切佛剎中盡未來劫一切諸佛所説廣説一切佛剎中一切如來現成正覺廣説虛空界等一切佛剎中佛坐道場眷屬圍繞菩薩大衆皆悉往詣廣説一念中三世一切佛出變化身充滿一切法界廣説一身充滿一切世界海一切佛剎海平等照持廣説一一境界中顯現三世一切諸佛自在功德地廣説一一微塵中顯現三世一切佛剎微塵等佛自在神力廣説一一毛孔出三世一切佛大願海音開發化導盡未來劫一切菩薩廣説處法界等師子之座大衆圍繞莊嚴道場各隨其處轉妙法輪盡未來劫未曾斷絶佛子此師子奮迅三昧有如是等不可説佛剎微塵等廣説唯是如來智慧境界爾時普賢菩薩摩訶薩欲重明師子奮迅三昧承佛神力觀察如來觀察大衆觀察如來不可思議境界觀察諸佛三昧觀察不可思議世界觀察不可思議智慧觀察一切法皆悉如幻觀察不可思議諸佛平等觀察無量無邊一切音聲語言道故以偈頌曰一一毛孔中普現最勝海佛處如來座菩薩衆圍繞一一毛孔中無量諸佛海道場處華座轉淨妙法輪一一毛孔中一切剎塵等最勝跏趺坐演説普賢行最勝坐一剎充滿十方界無盡菩薩雲來詣於佛所無量億佛剎塵數菩薩集圍繞於如來為説諸法界顯現諸佛剎入法界智海安住普賢行滿足諸佛行安住於如來一切諸世界深入菩薩行樂聞勝法雲一一剎無量億劫修諸行修習彼行已究竟深法海滿足大願海安住如來地出生最勝法具足普賢行成就功德海得無量自在如來身雲覆一切諸佛剎普雨甘露法令衆住佛道爾時世尊欲令諸菩薩安住師子奮迅三昧故放眉間白毫相光名普照三世法界門不可説世界微塵等光明以為眷屬普照十方一切世界海時祇洹林菩薩大衆普雲集者悉見一切法界虛空界等一切佛剎種種色種種清淨種種安住種種形如是等一切世界諸大菩薩現坐道場菩薩圍繞諸天供養成等正覺或見於不可説佛剎微塵等諸眷屬中出妙音聲充滿法界轉淨法輪或見在天宮殿在龍宮殿夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽及人非人等諸宮殿中或見在人聚落城邑大王京都現種種身種種姓名種種色種種圓光種種光網種種辨種種眷屬種種持種種教持種種音聲而為説法如此間如來為諸菩薩現甚深三昧神力變化一切法界虛空界等十方一切世界海中現國土身及衆生身諸業所起乃至一毛孔中一切悉現亦復如是而不壞三世不壞衆生普照一切諸衆生心色身清淨隨所應化普現一切衆生類前開示一切諸佛妙法調伏衆生顯現如來自在神力其有衆生見聞念知如來自在神通力者皆佛宿世善知識也皆悉修習四攝善根一向專求無上菩提攝諸善根成就方便逮得如來不可思議自在三昧悉與法界虛空界等或得法身或得色身或得菩薩具足諸行或得清淨諸波羅蜜或得菩薩圓滿淨行或得菩薩諸地或得菩提自在或得如來不壞三昧或得如來諸行智力或得如來無礙辨才此諸菩薩得如是等十不可説佛剎微塵等諸妙功德所謂種種道種種門種種入種種度種種方便種種至種種方種種光明種種功德種種功德具種種自在深入菩薩諸三昧海所謂普莊嚴法界菩薩三昧普照三世無礙三昧不壞法界智三昧隨時深入如來境界三昧普照虛空三昧行如來力三昧如來無畏莊嚴師子奮迅三昧一切法界方便藏三昧無礙法界淨月三昧清淨莊嚴法雲三昧除滅癡障法王幢三昧一一境界中悉見一切佛海三昧一切世間不可壞身清淨光明智幢三昧深入佛身無壞三昧隨順一切世藏三昧諸法無迹無依三昧圓滿普照寂滅三昧無所有善化普化遍照三昧攝持一切佛剎三昧莊嚴一切佛剎現成菩提三昧行一切王法三昧行一切衆生境界無礙三昧生一切諸佛三昧究竟一切佛德海三昧一一境界出生盡未來際功德三昧解了一切如來本生海三昧護持盡未來際一切如來種性三昧令現在十方一切佛剎海悉淨三昧於一念中普照一切佛住三昧遠離障礙深入一切境界三昧令一切剎入一佛剎三昧出一切佛化身三昧決定智慧金剛王入一切根海三昧住持一切佛身皆一身藏無差別三昧於一念中住一切佛法界方便無盡三昧於一切法界佛剎中示現涅槃三昧住無上地三昧令一切世界衆生悉見其身無別異三昧一切佛智現前三昧知一切法實相三昧於一念中具分別知三世三昧於一念中知一切法界藏三昧皆隨順知如來智師子行三昧於一切境界慧眼圓滿三昧十力境界等三昧於一切境界以平等眼示現三昧出生一切妙色衆生見無厭足三昧無動藏三昧一法攝一切法三昧一言普説一切音聲三昧一切佛無二法三昧離三世三昧分別一切劫不壞智三昧微細方便十力內三昧一切劫出生菩薩行無斷三昧一切十方普雲現前三昧菩提自在法界無礙三昧分別一切覺正希望安隱幢三昧一切莊嚴莊嚴虛空三昧於念念中出生化雲三昧離垢如空如來月光三昧一切佛持如空三昧一切法莊嚴法光三昧開一切法義燈三昧十力圓滿光三昧三世一切佛幢三昧一切佛同一藏三昧於念念中發起究竟一切事三昧無盡功德藏三昧示現無量無邊諸佛境界三昧住一切法金剛師子座三昧出生顯現一切如來變化無不知見三昧一切念如來日三昧一日悉覺三世三昧自然寂靜解脫三昧見一切佛三昧鉢曇摩華莊嚴一切法界決定智三昧一切法無著虛空淨眼三昧一方攝十方海三昧深入無底法界三昧一切法海三昧放一切光寂靜身三昧一念出生一切通明願三昧一切時一切處成菩提三昧一切法界入一莊嚴三昧一切佛住持三昧一切衆生勝地智明三昧一念中一身充滿法界三昧一身中顯現清淨法界三昧普門入法界顯現大莊嚴三昧一切佛法圓滿輪智住持三昧一切法方便一方便莊嚴三昧因陀羅網攝衆生界諸願精進住持三昧分別一切世界輪三昧蓮華妙德自在三昧分別一切衆生身三昧對現一切衆生身三昧分別一切音聲海三昧了知一切衆生地三昧不可壞大悲藏三昧一切佛入如來際三昧修習一切佛法門三昧觀察師子奮迅菩薩三昧如是等不可説佛剎微塵等三昧門入如來海入一切佛自在三昧於念念中充滿法界彼諸菩薩一一皆有妙師子座悉與十佛世界等現大自在甚深智慧悉得諸地明淨智慧普觀一切從智性生專求一切智具足成就離癡慧眼悉為衆生作調御師修行諸佛平等正法決定了知一切境界分別了知一切世界樂寂滅法遠離世間常好間靜遊諸佛剎無所染著於一切法心無所依安住莊嚴妙法宮殿教化成熟一切衆生為一切衆生顯現佛剎具足成就無上智門順離欲際得智慧身消竭一切諸有為海為一切衆生顯真實際法海慧光具足圓滿皆悉安住堅固三昧以大悲心常念衆生解一切衆生皆悉如夢一切如來悉如電光一切言音皆悉如響了一切法皆悉如化滿足諸願具菩薩行普智圓滿方便清淨心樂寂靜成滿一切諸陀羅尼智慧境界具足十力遠離恐怖安住法界具淨法眼得一切法無所有門修行無量智慧大海究竟到於智慧彼岸悉得般若波羅蜜力成就神通波羅蜜度衆生海於三昧波羅蜜悉得自在善知一切智無錯謬巧妙方便開示法藏具足辨才成就大願具足諸力法雲無盡於大衆中能師子吼而無所畏常求正法心無所著以淨慧眼滅除癡暗智月圓滿照世生滅成就智慧放大光明照一切諦善巧方便智慧功德金剛之山超出三世一切法王覺無所畏智功德幢滅諸魔幢建立精進圓滿智幢具足成就無上之身得一切法無礙智慧覺了無盡智真實際安住真際修行決定無相三昧巧方便生諸菩薩行無二智慧諦見境界世間諸趣普照佛剎無所染著於一切法除滅癡暗究竟智慧皆悉圓滿放淨法光照十方界為一切衆生作不虛福田若見聞者所願成滿為一切世間功德須彌遠離恐怖伏諸外道以微妙音遍一切剎常見諸佛心無厭足成就如來自在法身隨其所應而化度之能以一身滿一切剎以少方便具足清淨自在神力普遊十方無所障礙智慧圓滿遍照法界為一切衆耀明淨日隨其所應讚歎功德了一切衆生諸根希望於一切法得無諍境界分別了知諸法自性大小相攝決了如來甚深之地説句味身諸法深義無有窮盡於一言中普説一切修多羅海究竟一切諸陀羅尼廣智慧身究竟無量劫陀羅尼於一念中決定了知不可説劫於一念中了達三世法陀羅尼普照無量諸佛法海為一切衆生起淨智慧轉正法輪無能壞者成就如來智慧境界常入善現三昧正受遠離障礙深入諸法於一切法得勝智自在清淨莊嚴一切境界深入十方甚深法界攝取十方一切法界於一一微塵中現成正覺於無色性現一切色能以一方攝一切方彼諸菩薩具足成滿如是等無量功德智慧之藏常為一切諸佛讚歎以句味身説其功德不能窮盡皆悉雲集於祇洹林爾時彼諸菩薩深入如來功德大海入已於菩薩身中及樓閣中莊嚴具中師子座中以樂法力故不可思議力故於念念中各放無量光明雲普照法界覺悟衆生所謂出一切寶香光明雲讚歎三世諸佛功德微妙音聲充滿十方出一切衆生雲境界光明説一切衆生清淨業報微妙音聲充滿十方出一切菩薩願行莊嚴光雲説一切菩薩願行功德出一切佛變化身雲一切如來微妙音聲充滿十方出一切菩薩身雲相好莊嚴於一切佛剎以微妙音讚歎諸佛充滿十方出三世佛莊嚴道場雲現一切佛成等正覺充滿十方於一切境界中出龍王雲雨一切香充滿十方出一切佛身雲歎普賢行充滿十方出一切佛剎淨光明雲一切如來轉法輪音充滿十方時諸菩薩威神力故此法力故出如是等不可説佛剎微塵等雲爾時文殊師利菩薩摩訶薩承佛神力觀察十方欲讚歎祇洹林中無量莊嚴以偈頌曰觀察祇洹中如來自在力一切境界出無量功德雲無量淨妙色種種而莊嚴皆悉普照現十方諸佛剎佛子身毛孔出佛音聲雲種種寶莊嚴充滿十方剎其身如梵王威儀常安靜遍遊十方剎演出妙音聲如來毛孔出不可思議身皆悉如普賢衆妙相莊嚴菩薩普成就三世功德海充滿於虛空出生莊嚴雲於此祇洹中演出妙音聲普説一切衆善淨業果報一一境界中悉現佛剎海三世諸如來無量自在力如來毛孔中一切諸世界微塵等佛剎皆悉分別現一切境界中出生諸佛雲無量善方便度脫一切衆華雲香焰雲清淨摩尼寶種種莊嚴雲充滿於十方三世一切佛莊嚴妙道場於此祇洹林一切悉顯現普賢等佛子無量種莊嚴衆生等劫中所修嚴淨剎如是諸世界悉現祇洹林時彼一切諸菩薩衆以如來三昧照故一一皆得不可説佛剎微塵等大悲法門饒益安樂攝取衆生彼諸菩薩於一一毛孔各出不可説佛剎微塵等光明一一光明端各出不可説佛剎微塵等菩薩其身尊重於諸世間最為殊勝隨其所應皆悉顯現充滿法界教化衆生未度者度未脫者脫現不可説佛剎微塵等諸天宮殿無常死相一切諸法皆悉如夢讚歎道場説一切菩薩諸大願門或於一切世界示現受生為一切衆生廣現檀波羅蜜門或現一切諸佛圓滿淨戒功德尸羅波羅蜜門或現斷一切肢節羼提波羅蜜門或現勤修精進毗梨耶波羅蜜門或現一切菩薩禪定三昧相續解脫法門如來圓滿智慧光明專求一切佛法為一一句身味身義故能捨無量無數之身詣諸佛所問無量法門善知時會隨其所應而為現法令一切衆生住一切智逮得方便智光海門悉能供養諸佛菩薩降伏衆魔制諸外道悉能顯現菩薩力門知一切技術明淨智地欲令衆生得勝妙法悉能了知衆生諸根煩惱習氣種種業報及智慧地以如是等不可説佛剎微塵等法門教化衆生或現天宮或現龍宮夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽等宮或現梵宮或現人宮或現閻羅王宮或現地獄餓鬼畜生處大悲智慧及諸大願不可沮壞攝取衆生不捨方便或以名號教化或以憶念教化或以音聲教化或以圓滿光明教化或以光明網教化隨其所應悉現其前現處處莊嚴不離佛所不離樓閣座而普現十方或放化身雲或現無二身遊行十方教化衆生或現聲聞色像或現梵天色像或現一切苦行色像或現良醫色像或現商人色像或現正命色像或現妓人色像或現天色像或現一切技術色像或現一切城邑聚落京都色像隨其所應往詣其所或現種種色身音聲教化衆生或現諸語言法種種威儀種種菩薩行種種巧術一切智明為世間燈普照衆生業報莊嚴分別諸方悉行圓滿菩薩諸行悉現一切城邑聚落京都化度衆生爾時文殊師利童子從善安住樓閣出與一切同行諸菩薩俱金剛力士常隨侍衛本願足天樂聞法地天常習大悲泉池方天除滅愚癡夜天出生佛晝日天莊嚴正法界虛空河天度衆生生死海天長養一切善根薩婆若山天莊嚴一切衆生身滿足諸願供養一切佛身天守護一切衆生城天守護一切衆生夜叉王令一切衆生歡喜乾闥婆王除滅一切餓鬼趣鳩槃荼王於生死海拔濟衆生迦樓羅王正求薩婆若阿修羅王見佛歡喜無厭足摩睺羅伽王常厭生死諸天王常敬禮佛諸梵天王等俱詣佛所頭面禮足設諸供養已辭遊南方爾時尊者舍利弗承佛神力見文殊師利童子以菩薩莊嚴而自莊嚴出祇洹林遊行南方見已作如是念我今當與文殊師利菩薩俱行爾時尊者舍利弗與六千比丘眷屬圍繞從自房出來詣佛所禮足辭退向文殊師利此六千比丘是舍利弗共行弟子皆新出家其名曰海智比丘大善調伏比丘功德光比丘大童子比丘電光興比丘清淨行比丘天妙德比丘因陀羅慧比丘梵天比丘寂靜慧比丘如是等六千比丘已曾供養過去諸佛於諸佛所種諸善根性樂清淨信心明徹行諸大願觀佛境界了法實相饒益衆生常樂專求諸佛功德此等比丘皆是文殊師利之所化度爾時尊者舍利弗觀察大衆告海智比丘言汝可觀察文殊師利菩薩清淨之身相好莊嚴一切天人莫能思議光明圓滿令無量衆生發歡喜心放大莊嚴妙光明網除滅衆生無量苦惱觀其眷屬成就善根觀其遊步威儀庠序所遊行處自然平正十方無礙觀其功德所行道路其傍悉有衆妙寶藏自然發出觀其供養過去諸佛善根依果從衆林樹出莊嚴藏觀彼一切諸天大王恭敬禮拜供養雲雨海智汝觀文殊師利一切如來眉間毫相放無量光説諸佛法悉入其頂爾時尊者舍利弗為諸比丘讚説文殊師利無量功德諸大莊嚴彼諸比丘聞讚歎已皆悉歡喜其心清淨離諸垢穢身體柔軟調伏諸根遠離障礙現見諸佛正求菩提逮得菩薩清淨諸根具菩薩力長養大悲入諸波羅蜜發弘誓願悉見十方諸如來海時諸比丘白尊者舍利弗言唯然大師願俱往詣文殊師利爾時尊者舍利弗與諸比丘往詣其所到已謂文殊師利此諸比丘皆新出家欲見仁者爾時文殊師利童子即為顯現菩薩自在如象王回顧視比丘時諸比丘頭面禮足却住一面合掌而立作如是念我等以此禮拜功德知法實相如和上舍利弗釋迦牟尼世尊得清淨身相好音聲神力自在如文殊師利爾時文殊師利告諸比丘汝等當知若善男子善女人成就十種大心則得佛地況菩薩地何等為十所謂發廣大心長養一切善根究竟不退心無厭足見一切佛恭敬供養心無厭足正求一切佛法心無厭足遍行菩薩諸波羅蜜心無厭足具足一切菩薩三昧心無厭足於一切三世流轉心無厭足嚴淨佛剎充滿十方心無厭足教化成熟一切衆生心無厭足於一切剎一切劫中行菩薩行心無厭足發廣大心修習一切佛剎微塵等諸波羅蜜度脫一切衆生具佛十力心無厭足若善男子善女人成就如是十種大法則能長養一切善根離生死趣一切世間性超出聲聞緣覺之地生如來家具足成就菩薩大願行菩薩行住菩薩地成就如來功德之力降伏衆魔制諸外道彼諸比丘聞此法已皆得無礙淨眼三昧悉見十方一切如來及其眷屬無量衆生亦見種種世界形類衆寶宮殿及諸微塵乃至如來十眼境界皆悉覩見彼諸如來以種種句身味身種種辨才微妙音聲所説法海皆悉聞知彼世界中一切衆生心念諸根皆悉了知知彼衆生過去未來諸趣受生又能知彼過去未來各十劫事知彼如來十種本生十種成就菩提自在十種轉法輪十種神力十種教誡十種説法十種辨才得此三昧時具足成就十種實際菩提之心一萬三昧一萬淨波羅蜜得大智慧圓滿光明菩薩十明住菩提心爾時文殊師利菩薩勸諸比丘修普賢行住普賢行彼諸比丘出生大願海生大願海已身心清淨得不死通明得是明已不離此處出生一切如來法身充滿十方具足一切佛法爾時文殊師利菩薩建立彼諸比丘菩提心已與其眷屬漸遊南方至覺城東住莊嚴幢娑羅林中大塔廟處過去諸佛所遊止處亦是過去諸佛為菩薩時修苦行處此處常為一切天龍夜叉乾闥婆阿修羅人非人等之所供養時文殊師利即於此處説普照一切法界修多羅有百萬億修多羅以為眷屬説此法時於大海中有無量千億龍王與眷屬俱來詣文殊師利聞此法已厭離龍趣正求佛道捨龍身已生天人中一萬龍王於阿耨多羅三藐三菩提得不退轉時覺城人聞文殊師利在莊嚴幢娑羅林中大塔廟處聞已優婆塞優婆夷童男童女皆悉往詣文殊師利時有優婆塞名曰大智與千優婆塞眷屬俱其名曰須達多優婆塞婆須達多優婆塞功德光優婆塞名稱德優婆塞寂靜德優婆塞歡喜德優婆塞善慧優婆塞大慧優婆塞賢優婆塞賢妙德優婆塞如是等千優婆塞俱頭面禮足退坐一面復有五百優婆夷其名曰大慧光優婆夷善光優婆夷善身優婆夷可樂身優婆夷跋陀羅優婆夷賢德優婆夷賢光優婆夷光明幢優婆夷妙德光優婆夷善眼優婆夷如是等五百優婆夷俱頭面禮足退坐一面復有五百童子其名曰善財童子善行童子善戒童子善威儀童子善精進童子善心童子善慧童子善覺童子善眼童子善臂童子善光勝童子如是等五百童子俱頭面禮足退坐一面復有五百童女其名曰善行童女跋陀羅童女悅樂顏童女堅固慧童女妙功德童女勝體童女梵天與童女功德光童女善光明童女如是等五百童女俱頭面禮足退坐一面爾時文殊師利知覺城大衆集已隨其所應以大慈力令彼清涼大悲現前將為説法甚深智慧分別其心以大辨力而為説法觀察善財童子以何因緣名曰善財此童子者初受胎時於其宅內有七大寶藏其藏普出七寶樓閣自然周備金銀琉璃玻璃真珠硨磲碼瑙從此七寶生七種芽時此童子處胎十月出生端正肢體具足其七種寶芽高二尋廣七尋又其家內自然具有五百寶器盛滿衆寶金器盛銀銀器盛金金剛器盛衆香衆香器盛寶衣玉石器盛上味饌摩尼器盛雜寶種種寶器盛酥油蜜及以醍醐資生之具琉璃器盛衆寶玻璃器盛硨磲硨磲器盛玻璃碼瑙器盛赤珠赤珠器盛碼瑙火珠器盛淨水珠淨水珠器盛火珠如是等五百寶器自然行列又雨衆寶滿諸庫藏以此事故婆羅門中善明相師字曰善財此童子者已曾供養過去諸佛深種善根常樂清淨近善知識身口意淨修菩薩道求一切智修諸佛法心淨如空具菩薩行爾時文殊師利菩薩如象王回觀察善財而告之曰吾當為汝説微妙法即為分別諸佛正法分別諸佛次興世法淨眷屬法轉梵輪法諸佛色身相好清淨莊嚴之法一切諸佛具法身法諸佛音聲妙莊嚴法説一切如來平等正法爾時文殊師利知善財等一切大衆聞説此法皆大歡喜發菩提心顯明過去諸善根已不捨本座如應化度覺城衆生已遊行南方爾時善財童子從文殊師利聞佛如是諸妙功德專求菩提隨從文殊師利以偈頌曰三有為城郭高慢為園牆諸趣為却敵染愛為深塹愚癡暗覆蔽三毒常熾然惡魔為君王童蒙依止住貪愛所纏縛諂曲壞正行疑惑障慧眼流轉諸邪道慳嫉所繫縛趣向餓鬼難生老病死逼愚癡轉趣輪圓滿無上悲清淨智慧日消竭煩惱海願顧少觀察圓滿無上慈慧光安衆生一切無不曜月王願照我一切法界王淨法為四兵常轉正法輪願化我妙法具足菩提願積集功德藏饒益一切衆大師願度我忍鎧莊嚴身執持智慧劍於魔嶮惡道濟我免衆難住法須彌頂妙定天女侍降伏阿修羅帝釋觀察我具足離垢力分別一切有世間明淨燈願示我正趣遠離諸惡道悉令善趣淨開我解脫門超出諸世難著常樂我淨迷惑於生死清淨智慧眼願開解脫門遠離諸顛倒無畏知正道了達諸正趣示現我菩提安住正見地諸佛功德樹常雨正覺華願示我菩提世間明淨日三世諸如來如法而來去願令我悉見分別一切業深知諸法性決定智慧乘示我摩訶衍諸願輪成滿大悲不可盡淨妙德莊嚴安我菩提乘具足淨法界大慈為觀察功德華莊嚴賜我第一乘安住梵行座三昧女朝侍微妙法音樂示我法王道無盡四攝藏功德莊嚴智光明照一切願速示勝道施惠圓滿光栴檀戒塗身忍辱大莊嚴願速示正道深入諸禪定教化群生類具足方便乘安我勝法乘諸願圓滿輪永絶生死輪具足持智力安我妙法乘一切悉殊妙大悲觀衆生究竟勝妙行安我實智乘安住金剛慧究竟一切智除滅諸障礙安我賢聖乘慈悲甚彌廣安樂諸群生法界等淨眼安我無上乘除滅衆苦陰諸業煩惱輪降伏一切魔安我正法乘智慧照十方莊嚴諸法界滿足衆生願安我勝妙乘心淨如虛空除滅邪見愛饒益一切衆安我勝法乘安住如風輪普持一切剎令衆住定地安我殊勝乘安住如大地具足大悲力智慧益衆生安我最勝乘四攝光圓滿饒益群生類總持清淨光示我明淨日開發淨慧眼莊嚴妙智王冠以無上冠法王慈顧我
