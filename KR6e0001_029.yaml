body:
  text: 東晉天竺三藏佛馱跋陀羅譯心王菩薩問阿僧祇品第二十五爾時心王菩薩白佛言世尊所謂阿僧祇不可量無分齊無周遍不可數不可稱量不可思議不可説不可説不可説世尊云何阿僧祇乃至不可説不可説耶佛告心王菩薩言善哉善哉善男子饒益衆生故乃能問此如來應供等正覺佛智境界甚深之義善男子汝今諦聽我當説之爾時心王菩薩白佛言世尊唯然善聽佛告心王菩薩言百千百千名一拘梨拘梨拘梨名一不變不變不變名一那由他那由他那由他名一鞞婆邏鞞婆邏鞞婆邏名一作作作名一來來來名一勝勝勝名一復次復次復次名一阿婆邏阿婆邏阿婆邏名一得勝得勝得勝名一分界分界分界名一充滿充滿充滿名一量量量名一解解解名一此解此解此解名一離欲離欲離欲名一捨捨捨名一聚聚聚名一通通通名一頻申頻申頻申名一網網網名一衆流衆流衆流名一出出出名一分分分名一分別分別分別名一稱稱稱名一持持持名一不顛倒不顛倒不顛倒名一不幡不幡不幡名一正正正名一慧慧慧名一第一第一第一名一覺覺覺名一毗遮妬毗遮妬毗遮妬名一極高極高極高名一妙妙妙名一邏婆邏婆邏婆名一訶梨婆訶梨婆訶梨婆名一解脫解脫解脫名一黃黃黃名一訶梨那訶梨那訶梨那名一因因因名一賢覺賢覺賢覺名一明相明相明相名一摩樓陀摩樓陀摩樓陀名一忍忍忍名一枝枝枝名一摩樓摩摩樓摩摩樓摩名一等等等名一離疑離疑離疑名一種種種名一不放逸不放逸不放逸名一摩多羅摩多羅摩多羅名一動動動名一到到到名一説説説名一白白白名一了別了別了別名一究竟究竟究竟名一清涼清涼清涼名一阿羅阿羅阿羅名一潮潮潮名一油油油名一祇邏祇邏祇邏名一味味味名一泥邏泥邏泥邏名一戲戲戲名一斯羅斯羅斯羅名一聚沫聚沫聚沫名一彌羅彌羅彌羅名一堅固堅固堅固名一風風風名一滿滿滿名一不可稱量不可稱量不可稱量名一根根根名一微細微細微細名一蓮華蓮華蓮華名一摩伽婆摩伽婆摩伽婆名一不可度不可度不可度名一醯樓醯樓醯樓名一語語語名一劫劫劫名一婆婆婆婆婆婆名一間間間名一無間無間無間名一離垢離垢離垢名一實勝實勝實勝名一彌羅覆彌羅覆彌羅覆名一遮摩羅遮摩羅遮摩羅名一法法法名一波羅摩馱波羅摩馱波羅摩馱名一決定決定決定名一流轉流轉流轉名一廣説廣説廣説名一無盡無盡無盡名一等真實等真實等真實名一無我無我無我名一阿槃陀阿槃陀阿槃陀名一青蓮華青蓮華青蓮華名一數數數名一趣趣趣名一受受受名一阿僧祇阿僧祇阿僧祇名一阿僧祇轉阿僧祇轉阿僧祇轉名一無量無量無量名一無量轉無量轉無量轉名一無分齊無分齊無分齊名一無分齊轉無分齊轉無分齊轉名一無周遍無周遍無周遍名一無周遍轉無周遍轉無周遍轉名一無數無數無數名一無數轉無數轉無數轉名一不可稱不可稱不可稱名一不可稱轉不可稱轉不可稱轉名一不可思議不可思議不可思議名一不可思議轉不可思議轉不可思議轉名一不可量不可量不可量名一不可量轉不可量轉不可量轉名一不可説不可説不可説名一不可説轉不可説轉不可説轉名一不可説轉轉爾時世尊為心王菩薩以偈頌曰不可言説不可説充滿一切不可説不可言説諸劫中説不可説不可盡不可言説諸佛剎皆悉盡末為微塵悉於一一微塵中演説一切不可説悉能善於一念中説不可説諸世界不可稱説諸劫中念念次第而演説不可説劫猶可盡而不可説不可盡悉於一一微塵中分別演説不可説不可説劫猶可盡而不可説不可盡不可言説微塵中悉有不可説衆生皆共讚歎普賢德猶尚不能令窮盡設使一微毛端處有不可説諸普賢彼諸一切普賢等説不可説不能盡如一微細毛端處十方世界亦如是於彼一一毛端處置不可説諸佛剎毛端能量虛空盡而説佛剎不可盡於彼一一毛道中種種無量諸佛剎有同類者不可説亦有異類不可説於彼一一毛道中有不可説淨佛剎以不可説莊嚴具莊嚴彼彼諸佛剎於彼一一毛道中演出名身不可説於彼一一諸名身廣宣無量諸佛名一一如來自身中變化毛孔不可説於彼一一毛孔中出生異色不可説於彼一一異色中放妙光明不可説於彼一一光明中出寶蓮華不可説於彼一一寶蓮華各有寶葉不可説於彼一一寶蓮葉有微妙色不可説於彼一一妙色中出生蓮華不可説於彼一一蓮華中各放光明不可説於彼一一光明中出生淨月不可説於彼一一諸月中復出淨月不可説於彼一一淨月中出淨光明不可説於彼一一光明中出不可説明淨日於彼一一諸日中出不可説淨妙色於彼一一妙色中出不可説淨光明於彼淨妙光明中出不可説師子座不可言説莊嚴具出不可説淨光明於彼一一光明中出不可説異妙色於彼一一妙色中出不可説明淨寶於彼一一明淨寶出不可説不可説金剛寶藏如須彌清淨具足而莊嚴於彼一寶須彌中有不可説不可説微妙殊特諸佛剎清淨具足而莊嚴如此一寶須彌山一切須彌亦如是悉有無量不可説具足清淨諸佛剎是不可説不可説皆悉分別不可説攝取不可言説轉出生光明不可説於彼一一光明中出生諸佛不可説彼諸一切如來等説不可説清淨偈彼偈悉於念念中説不可説真實諦示現一切未來際如來智慧無窮盡彼諸一一如來等出不可説梵音聲於彼一一梵音中轉不可説淨法輪於彼一一法輪中雨不可説修多羅於彼一一修多羅分別諸法不可説於彼一一諸法中又説諸法不可説又復於彼諸法中説衆生依不可説又於一一毛道中不可説劫説正法如彼一微毛端處