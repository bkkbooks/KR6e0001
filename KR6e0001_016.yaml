body:
  text: 東晉天竺三藏佛馱跋陀羅譯金剛幢菩薩十回向品第二十一之三佛子何等為菩薩摩訶薩第六隨順一切堅固善根回向此菩薩摩訶薩若為王時得勝國土安隱豐樂降伏怨敵治以正道如法教化功蓋天下德覆十方萬國歸順無敢違命兵仗不用自然泰平以四攝法善攝衆生轉輪聖王七寶成就此菩薩摩訶薩堅固安住自在功德眷屬和睦不可沮壞端正第一觀者無厭離一切惡功德具足相好成滿顏容殊特身體肢節端嚴周備鮮潔明淨見者歡喜體力堅固不可毀壞攝取天帝那羅延身離諸業障得清淨業具足修行一切布施若施飲食種種美味諸乘衣服衆妙華鬘雜香塗香床座住處房舍燈明湯藥寶器莊嚴寶車象馬寶王衆妙寶座諸蓋幢幡種種雜寶妙莊嚴具清淨天冠髻中明珠若見獄囚受諸楚毒起大悲心捨諸庫藏妻子眷屬以身處獄救苦衆生見送獄囚趣於死地自捨己身以代彼命若有人乞連膚頂髮髻中明珠眼耳鼻根牙齒舌根頭頂手足壞身出血髓肉及心腸腎肝肺肢節諸骨厚皮薄皮或手足指連肉指爪為求正法投身火坑為求法故舉身具受無量衆苦為法難得故能捨大地四海國土大小諸城村邑丘聚國土豐樂人民熾盛園林浴池華果繁茂無量莊嚴天下太平無諸怨敵金銀寶藏妻子眷屬自在法王斷除一切屠殺惡業普施無畏若見有人毀壞畜狩及以人根令身殘闕起大慈悲而救度之以大音聲普告一切令聞佛名或施大地起佛殿堂造僧房舍安處菩薩聖衆福田或建尊廟隨應一切或施僮使供給三尊父母知識一切福田以身布施一切給使復以自身普覆諸佛以自身施一切衆生常以己身奉給諸佛布施國土及王京都嚴飾大城又施寶女侍人眷屬妻妾男女或施以家種種莊嚴遊戲園林或設無數大衆施會遠離諸惡淨衆生故悉捨一切資生之具心不貪著不求果報悉能捨離若諸衆生人與非人貧賤富貴或善或惡種種福田遠近諸方一切悉來或自來求或不來求一切悉施無所慳吝作如是念攝取隨順一切堅固善根回向攝取善色隨順一切堅固善根回向攝取善受想行識隨順一切堅固善根回向攝取國土隨順一切堅固善根回向攝取勝人隨順一切堅固善根回向攝取眷屬隨順一切堅固善根回向攝取財利隨順一切堅固善根回向攝取一切惠施隨順一切堅固善根回向菩薩摩訶薩如是諸善根回向已作如是念我所行施無貪無著無染解脫其心真直無所慳惜以此惠施功德之力令一切衆生得大智慧心無障礙知食見食無所貪著但以法食永離摶食智慧充滿攝取善根法身智身清淨遊行為化衆生現受摶食菩薩摩訶薩若施飲時如是回向以此善根令一切衆生飲法甘露成菩薩道除滅渴愛常樂大乘離五欲愛得淨法愛法身柔軟三昧調心未曾散亂入智慧海興大法雲雨法甘露是為菩薩摩訶薩布施飲時善根回向菩薩摩訶薩若施衆味所謂辛酸鹹淡甘苦如是無量肴膳香味食之無厭能令四大柔軟安樂身體充滿氣力康強發歡喜心明淨諸根嚴持內身長育柔軟肌色光潤一切毒害所不能壞消滅衆疾得無患法菩薩摩訶薩施如是等無量無數諸美味時如是回向以此善根令一切衆生得上味相甘露充滿令一切衆生心得安住法味深智悉知一切衆味之業令一切衆生悉得無量深妙法味了法界智安住實際得到法城令一切衆生法雲普雨充滿法界悉能調伏成熟衆生令一切衆生得勝智味無上法愛柔軟身心令一切衆生得上味相不著衆味修習一切佛法諸願令一切衆生皆善和合得一味法出生諸佛無二之法令一切衆生得無礙味於一切智乘得不退轉令一切衆生得一切佛無雜法味善能分別一切諸根令一切衆生法味充滿具足安住無礙佛法是為菩薩摩訶薩施衆味時善根回向令一切衆生悉得具足無礙智身菩薩摩訶薩布施乘時如是回向以此善根令一切衆生乘一切智乘具足大乘不可壞乘勝乘上乘速疾乘大力乘功德成就乘出世間乘出生無量諸菩薩乘功德滿足是為菩薩摩訶薩布施乘時善根回向菩薩摩訶薩布施衣時如是回向以此善根令一切衆生得慚愧法服以覆其身離諸陋形端嚴殊妙顏容鮮澤膚體柔軟得身上樂諸佛之樂無量法身普應一切無上清淨一切種智是為菩薩摩訶薩布施衣時善根回向菩薩摩訶薩布施衆華鮮妙香華種種色華無量樂華善現之華樂無厭華一切時華天華人華世所樂華無上香華如是等無量衆華菩薩摩訶薩悉以供養現在十方一切諸佛及滅度後供養塔廟諸法施者比丘僧寶一切菩薩諸善知識聲聞緣覺父母親族乃至自身下及貧賤菩薩摩訶薩布施華時如是回向以此善根令一切衆生悉得諸佛三昧之華清淨開敷妙法衆華從其心出令一切衆生觀無厭足得佛法愛令一切衆生常見妙色身相端嚴見者無厭令一切衆生未曾散亂具足一切清淨行業令一切衆生常念善知識心無變異令一切衆生如阿伽陀藥悉除一切煩惱衆毒令一切衆生滿足大願決定安住無上智王令一切衆生出智慧日除滅一切愚癡暗冥令一切衆生如淨滿月長菩提月開功德華令一切衆生入大寶海見善知識具足成就一切善根是為菩薩摩訶薩布施華時善根回向令一切衆生悉得無礙清淨妙智菩薩摩訶薩布施鬘時如是回向以此善根令一切衆生人所樂見見無不欣見輒親善見無不愛見離憂惱必見諸佛得一切淨智是為菩薩摩訶薩布施鬘時善根回向菩薩摩訶薩布施香時如是回向以此善根令一切衆生具足戒香得不壞戒不雜戒離垢戒離疑戒離纏戒清涼戒不犯戒無量戒無上戒離世間戒菩薩究竟至彼岸戒令一切衆生具足成就諸佛戒身是為菩薩摩訶薩布施香時善根回向令一切衆生具足成就無礙戒身菩薩摩訶薩施塗香時如是回向以此善根令一切衆生施香普熏悉捨所有令一切衆生戒香普熏得佛淨戒令一切衆生忍香普熏離毒害心令一切衆生精進之香具足普熏勤修大乘弘誓莊嚴令一切衆生定香普熏具足諸佛現前三昧令一切衆生慧香普熏於一念中得無上智王令一切衆生法香普熏成就無上無畏之法令一切衆生德香普熏成就一切功德智慧令一切衆生無上菩提妙香普熏得佛十力究竟彼岸令一切衆生白淨法香具足普熏斷除一切諸不善法是為菩薩摩訶薩施塗香時善根回向菩薩摩訶薩施床座時如是回向以此善根令一切衆生得天寶座安處慧床令一切衆生得賢聖座捨凡夫意修菩提心令一切衆生得安樂座離生死苦令一切衆生得最上座見諸如來自在神力令一切衆生得平等座等心普照一切諸法令一切衆生得最勝座得無上業永離世間令一切衆生得安隱座身證一切諸深妙法令一切衆生得清淨座修習如來淨智境界令一切衆生得安住座得善知識常隨覆護令一切衆生得師子座具足如來無畏之座是為菩薩摩訶薩施床座時善根回向令一切衆生修習念慧調伏諸根菩薩摩訶薩施住處時如是回向以此善根令一切衆生悉得如來嚴淨佛剎修習功德莊嚴佛剎安住甚深三昧境界於彼住處而無所著善能分別一切住處離世間住安住佛住攝取一切諸佛所住究竟大道安樂善住修習無量清淨善根未嘗捨離佛無上住是為菩薩摩訶薩施住處時善根回向令一切衆生安樂饒益救護一切菩薩摩訶薩施房舍時如是回向以此善根令一切衆生饒益安樂正念思惟令一切衆生依如來住依大智住依善知識住依尊重住依善行住依大慈住依大悲住依六波羅蜜住依無量菩提心住依一切菩薩道住是為菩薩摩訶薩施房舍時善根回向令一切衆生具足成就清淨智慧諸通功德菩薩摩訶薩惠施燈明所謂酥燈油燈寶燈摩尼燈漆燈火燈沈水香燈栴檀香燈一切香王燈無量色光焰燈以如是等無量燈明施時如是回向以此善根饒益一切衆生攝取一切衆生令一切衆生得無量光普照一切諸如來法令一切衆生得明淨光普照一切諸微細色令一切衆生得離癡光善能了知無衆生界令一切衆生得無量光法身淨光普照一切令一切衆生得普光明於諸佛法得不退轉令一切衆生得佛光明普照一切無量佛剎令一切衆生得無礙光以一光明普能遍照一切法界令一切衆生得無量光普照佛剎光明不斷令一切衆生得光明幢王慧光幢燈普照世間令一切衆生得無量色光放自在光照一切剎是為菩薩摩訶薩施燈明時善根回向悉能饒益一切衆生悉能安樂一切衆生隨順善根順攝衆生善根善攝一切衆生等施善根等施衆生慈愍善根愍念衆生普覆善根普蔭衆生布施善根滿足衆生普入一切善根境界平等善根平等衆生智慧善根分別一切是為菩薩摩訶薩燈明施時善根回向令一切衆生得無礙回向安住一切明淨善根菩薩摩訶薩施湯藥時如是回向以此善根令一切衆生離諸障礙令一切衆生捨離病身悉得如來清淨法身令一切衆生皆成藥性悉能除滅一切衆生不善之病令一切衆生成阿伽陀藥安住菩薩不退轉地令一切衆生成如來藥拔出一切煩惱毒刺令一切衆生習近賢聖除滅煩惱得清淨行令一切衆生得藥王意未曾厭離一切善法令一切衆生具足成就不壞藥樹對治一切諸不善病令一切衆生除諸病刺悉得一切智慧光明令一切衆生解了世間諸對治法隨應群生對治衆病菩薩摩訶薩施藥善根如是回向已因此善根令一切衆生捨離諸病安隱無患具足清淨得諸如來無病之法令一切衆生出諸病刺得無盡身金剛圍山所不能壞具足堅固一切諸力成滿諸佛無上法樂得佛神力自在法身是為菩薩摩訶薩施湯藥時善根回向菩薩摩訶薩悉能惠施一切諸器所謂以真金器盛滿雜寶以白銀器盛滿雜寶以琉璃器盛滿雜寶以玻璃器盛滿雜種寶莊嚴具以硨磲器盛赤珠寶以碼瑙器盛滿珊瑚夜光衆寶又以石器盛諸美膳以栴檀器盛衆寶衣以金剛器盛滿衆香如是等無量無數諸妙寶器盛以無量無數妙寶或施諸佛信佛福田不思議故或施菩薩寶發菩提心諸善知識難值遇故或施衆僧長養佛法故或施福伽羅聲聞緣覺愛聖法故或施父母為尊重故或施師長為教如法修功德故乃至布施下品凡劣大慈大悲愛眼等心觀衆生故不捨三世一切菩薩滿足檀波羅蜜故一向專求無上菩提故悉捨一切內外所有不捨一切衆生類故不著福田及財物故菩薩摩訶薩以如是等無量寶器盛以無量雜寶施時如是回向以此善根令一切衆生成廣大藏器成虛空等廣大念根世間出世間一切經書悉能受持不忘失故令一切衆生成清淨器普能受持佛深法故令一切衆生成無上寶器悉能受持去來今佛一切法故令一切衆生普成如來勝法寶器悉能受持三世諸佛無壞法故令一切衆生成莊嚴寶器受持無極菩提心故令一切衆生悉成一切功德之器志樂如來無量淨智故令一切衆生成一切智內法之器究竟如來無礙解脫一切智故令一切衆生成未來際劫一切菩薩所行之器一切衆生堅固安住一切智力故令一切衆生成三世佛勝妙法器一切諸佛梵音説法悉受持故令一切衆生悉成內器其身容受一切世界虛空界法界諸佛眷屬勸請諸佛轉大法輪悉能受故是為菩薩摩訶薩布施器時善根回向令一切衆生成諸法器皆能受持普賢菩薩一切願行菩薩摩訶薩以無量種種莊嚴寶車奉施諸佛菩薩及善知識如來大衆聲聞緣覺一切福田種種衆生從餘方來或承菩薩名聞故來或是菩薩因緣故來或聞菩薩發施願故來或是菩薩心願請來菩薩摩訶薩或施種種莊嚴妙寶金車金鈴網覆微動相扣出和雅音垂寶瓔珞種種莊嚴或施清淨琉璃寶車無量珍妙以為嚴飾或復施與衆妙寶車白銀莊嚴白網羅覆或復施與神馬寶車無量億寶以為莊嚴或復施與大象寶車無量億寶以為莊嚴一切寶網絞絡其上或復施與栴檀香車種種寶輪以為莊嚴寶師子座以敷其上百千采女列侍其內人相具足顏容姝妙衆寶華蓋彌覆其上十萬壯士而牽御之或復施與玻璃寶車無量雜色妙寶莊嚴載以無數端嚴采女衆雜寶帳以覆其上寶繒幢幡周匝莊嚴或復施與碼瑙寶車飾以衆寶熏以雜香摩以塗香散以妙華百千采女持金瓔珞平正安詳其疾如風或復施與堅固香車敷以種種柔軟寶衣衆妙寶網羅覆其上清淨妙香而以熏之其香殊妙能悅人心逆風遠熏聞者無厭諸天子等在前牽御或復施與一切寶車種種雜色以為絞飾衆妙寶網羅覆其上諸雜寶帶周匝垂下敷以寶衣散以末香所愛男女悉載其上菩薩摩訶薩以如是等衆妙寶車施諸佛時如是回向以此善根令一切衆生悉皆樂求無上福田深信施佛有無量報令一切衆生一心向佛逮得無量清淨果報令一切衆生於諸佛所無慳吝心具足大施無所愛惜令一切衆生於諸佛所修上福田離二乘願得諸如來無礙解脫一切種智令一切衆生於諸佛所種無盡善根得佛無量功德智慧令一切衆生攝取深慧具足清淨無上智王令一切衆生所遊自在得諸如來至一切處無礙神力令一切衆生攝取大乘得無量種智安住不動令一切衆生具足成就第一福田皆能出生一切智地令一切衆生於一切佛無嫌恨心種諸善根樂求佛智令一切衆生以少方便往詣一切莊嚴佛剎於一念中深入法界而無疲倦令一切衆生入虛空等菩薩神通悉能遍至一切佛所令一切衆生得無比身盡能遍遊十方世界而無疲倦令一切衆生成廣大身得隨意行令一切衆生得一切佛神力莊嚴究竟彼岸於一念中顯現如來自在神力遍虛空界令一切衆生修安隱行隨順一切諸菩薩行令一切衆生行疾無礙究竟十力智慧彼岸令一切衆生得轉一切世界力波羅蜜普入一切不壞法界令一切衆生行普賢行到於彼岸得不退轉一切種智令一切衆生乘無比智乘隨順修行一切法界見真實性是為菩薩摩訶薩以諸寶乘奉現在諸佛及滅度後舍利塔廟善根回向令一切衆生究竟諸佛無礙大乘菩薩摩訶薩施諸菩薩及善知識清淨乘時如是回向以此善根令一切衆生不捨菩薩諸善知識知恩報恩令一切衆生同善知識義攝取同性善根故令一切衆生親近尊重恭敬供養諸善知識悉捨一切攝善知識令一切衆生得正直心隨善知識未曾遠離令一切衆生常見善知識不違其教令一切衆生得正直心不捨善知識離一切垢心不可壞令一切衆生為善知識不惜身命悉捨一切不違其教令一切衆生為善知識之所攝取修習大慈遠離諸惡令一切衆生順善知識聞佛正法悉能受持令一切衆生同善知識善根業報菩薩行願究竟清淨平等滿足令一切衆生出生正法善知一切三昧境界智慧具足神通自在令一切衆生遠離諸趣受持一切法究竟到彼岸令一切衆生乘於大乘乃至究竟一切種智於其中間無有懈怠令一切衆生乘智慧乘至安隱處無有退轉令一切衆生知真如行遠離愚癡聞持一切諸佛正法令一切衆生皆為一切諸佛所攝得無礙智究竟諸法令一切衆生得不死神足妙速無礙令一切衆生遊行自在調伏衆生成摩訶衍令一切衆生所行不虛皆悉究竟得智慧乘令一切衆生得無礙乘以無礙智至一切處是為菩薩摩訶薩施善知識種種乘時善根回向令一切衆生功德具足與佛菩薩等無差別悉能悅可一切賢聖菩薩摩訶薩施如來衆種種寶乘時善學施心慧分別心淨功德心隨順施心僧寶難遇心深信僧寶心攝取正教心安住正直心善能究竟大施之會出生無量無邊功德於佛正教信心清淨不可沮壞菩薩摩訶薩以種種乘施僧寶時如是回向以此善根令一切衆生向佛正法攝取正教令一切衆生專心內觀除滅邪法成就聖處令一切衆生得賢聖地以如來法展轉相教令一切衆生舉世宗重言必信用令一切衆生入一切法善能分別無二法界令一切衆生人寶圍繞從如來智境界出生令一切衆生住離垢法皆能除滅煩惱塵垢令一切衆生悉從無上僧寶出生離凡夫法得聖僧地令一切衆生具足聖法修無礙智令一切衆生為大衆主智慧莊嚴不染世間令一切衆生以善方便轉慧法輪令一切衆生得一念神力悉能周遍不可説不可説世界令一切衆生乘虛空身於一切世間智慧無礙令一切衆生往詣虛空法界等如來大衆所令一切衆生得輕舉身勝妙智慧悉能遍遊諸佛世界令一切衆生得無礙神足於一切剎普能現身令一切衆生得大自在神足彼岸不起一座悉普應現一切世界令一切衆生得淨法身於諸世界而無所著出生神力行疾如電令一切衆生現不思議神足境界善能隨順教化調伏一切衆生不失其宜令一切衆生得妙神足一念遍遊十方世界一念超度一切法界無所罣礙是為菩薩摩訶薩施如來衆種種乘時善根回向令一切衆生普乘清淨無上智乘於一切世界轉無礙法輪智輪復次菩薩摩訶薩施聲聞緣覺種種乘時發恭敬心尊重心福田心功德海心出生功德智慧心深信如來功德心修習無量億那由他清淨善根心於不可説劫修習菩薩清淨行心解脫一切魔繫縛心摧滅一切魔軍衆心不可稱量明淨智慧善能分別一切諸法令一切衆生皆成可信第一福田具足無上檀波羅蜜令一切衆生離無益言樂獨間靜心無二念令一切衆生成最勝清淨第一福田修習功德攝取衆生令一切衆生成智慧池能與衆生無數善果令一切衆生至無礙趣最勝福田清淨圓滿令一切衆生其心安住無諍三昧解一切法無性為性令一切衆生具足長養無量功德常遇最勝第一福田令一切衆生示現無量自在神力隨順攝取清淨福田令一切衆生成就無盡功德福田能與一切十力乘果令一切衆生成真實福田具足無盡功德之藏究竟一切智令一切衆生滅諸惡法聞佛正法句身味身悉能受持令一切衆生普聞佛法隨所聞解其德不虛令一切衆生聞佛説法得到彼岸所聞佛法能為衆生隨順演説令一切衆生常樂如來正教之法除滅一切九十六種外道邪見令一切衆生常見賢聖長養一切最勝善根令一切衆生樂明行足者常得瞻對與共同止永處安樂令一切衆生所聞不虛解聲如響見佛出生令一切衆生善分別知諸佛正教悉能守護持佛法者令一切衆生心常樂向聞持佛法能照顯現如來法教令一切衆生深心信解如來正教一切功德令佛歡喜善解真諦悉捨內外究竟大施是為菩薩摩訶薩施聲聞緣覺種種乘時善根回向令一切衆生得無上智淨諸神通精勤修習無有懈怠究竟佛智力無所畏菩薩摩訶薩若諸方來一切福田或承菩薩名聞故來或與菩薩因緣故來或聞菩薩本願故來或復菩薩心願請來菩薩於彼悉樂惠施而無厭倦爾時菩薩於來求者發悔過心作如是言諸人當知我應詣彼禮拜供養種種惠施而今為我故從遠來菩薩即時敬禮悔過愛言慰諭屈辱遠來得無疲倦處令安隱供給所須或施摩尼寶車載以閻浮提內第一女寶或施金車載以己國最勝寶女或施清淨琉璃寶車載以內妓或施樂車載以童女容貌如天或施無量無數寶莊嚴車載以寶女種種莊嚴或施菩薩所乘栴檀香車或施玻璃寶車載以寶女端正殊特顏容無倫威儀具足進止安詳神珠名寶瓔珞其身樂修善法或施碼瑙寶車載以太子或施堅固香車載以男女或施種種寶莊嚴車載以難壞親愛眷屬以如是等種種寶車隨其所求皆給施之滿足彼願歡喜無量菩薩摩訶薩諸乘施時如是回向以此善根令一切衆生乘不退轉摩訶衍乘詣不思議菩提樹下令一切衆生乘大智乘盡未來劫一切菩薩所行之法皆能修習令一切衆生乘無所有乘於一切法心無所著捨離虛妄具足修習一切智道令一切衆生悉乘離垢寂靜之乘無礙神力詣諸佛剎令一切衆生決定安住一切智乘常以諸佛法樂自娛令一切衆生乘諸菩薩清淨行乘出生菩薩十種之道樂修菩薩一切三昧令一切衆生乘四輪乘住正國輪依正士輪本功德輪平等願輪菩薩淨行由斯滿足令一切衆生乘明法乘遍遊十方修佛智力令一切衆生乘佛法乘於一切法究竟彼岸令一切衆生乘一切功德善根不可思議法乘為十方衆生現安隱道令一切衆生乘一切施乘斷除慳垢令一切衆生乘清淨尸波羅蜜乘具足無量無邊法界等一切淨戒令一切衆生乘羼提波羅蜜乘離瞋恚心於諸衆生不起惱害令一切衆生乘不退轉毗梨耶波羅蜜乘具菩薩行往詣道場令一切衆生乘禪波羅蜜乘速赴道場令一切衆生乘般若波羅蜜乘化身充滿一切法界及佛境界令一切衆生乘法王乘成就無畏施一切智微妙之法令一切衆生乘無所著智慧願乘悉能遍入一切諸方於真法性而無所入令一切衆生乘諸佛法乘於一切剎示現受生而不毀壞於摩訶衍令一切衆生乘一切智乘滿足菩薩平等大願而無懈倦是為菩薩摩訶薩施種種乘普施衆生無量福田以歡喜心善根回向令一切衆生無量種智皆悉具足乘於一切成滿智乘菩薩摩訶薩布施象寶七支具足六瘤成滿六牙如雪口淨如華身體平正毛色鮮白珍麗奇飾莊嚴其身淨妙寶網以覆其上種種雜寶莊嚴其首光色晃曜儀體安雅瞬息之頃超步萬里猛氣奔踊而無疲倦菩薩摩訶薩布施寶馬形體殊妙毛色光澤馬相具足如天寶馬無量珍飾莊嚴其身明月神珠以為光曜金鈴寶網以覆其上行不奔驟迅踰疾風致遠不疲乘者安豫巡遊四方不失主意以此寶乘隨意施與或施福田或獻尊重或遺知識或奉父母或給貧匱其有須者皆悉與之大心惠施無所吝惜心常歡喜無有悔恨大悲充滿能行大施一向專求菩薩功德最勝生地直心清淨以如是心善根回向令一切衆生成就人寶生菩薩功德莊嚴大乘令一切衆生乘善法乘隨順能至一切佛法令一切衆生常樂大乘得佛無礙智慧力乘光明普照令一切衆生乘勇猛大乘滿足諸願令一切衆生具足平等波羅蜜乘成就滿足一切善根令一切衆生成就寶乘出生佛法無上智寶令一切衆生分別菩薩莊嚴之行得是妙乘出於三界悉開菩薩諸三昧華令一切衆生無量阿僧祇劫清淨修習菩薩所行乘無量乘疾解諸法令一切衆生施大乘寶乘以善方便具菩薩地令一切衆生成最高廣安隱大乘悉能運載一切衆生至無上道是為菩薩摩訶薩無量阿僧祇那由他劫施象馬寶善根回向令一切衆生乘無礙智乘得至如來究竟寶乘菩薩摩訶薩施種種座或施聖王師子之座琉璃為足金縷織成柔軟妙衣以敷其上熏以一切堅固之香建立種種上妙寶幢無量億寶以為莊嚴白淨寶網彌覆其上金鈴羅網動發妙音百萬億那由他淨妙寶像周匝圍繞其座高廣清淨嚴飾無量阿僧祇衆生樂觀無厭功蓋天下自在大王之所坐處處於彼座以正治國無敢違逆種種妙寶莊嚴其身青寶珠王大青寶珠王勝藏寶珠以為莊嚴明淨猶日清涼如月衆星莊嚴如海勝寶海堅固幢離垢明淨閻浮檀金妙色寶繒以冠其首一切閻浮提內大力灌頂王法以灌其頂具功德力大慈悲主降伏怨敵無敢違命菩薩摩訶薩如是無量無數為轉輪王得法自在正治國時以如是等種種衆寶嚴飾之座或施正覺諸善知識及賢聖僧聞法歡喜奉施法師供養父母諸尊重者聲聞緣覺一切菩薩乃至初發大乘心者及以一切諸佛塔廟或施無量貧窮下劣有所須欲皆給施之布施座時如是回向以此善根令一切衆生得菩提座自然覺悟諸佛正法令一切衆生得自在座具足成就於法自在諸金剛山所不能壞悉能降伏一切諸魔令一切衆生得佛自在師子之座一切衆生樂觀無厭令一切衆生得不可説不可説清淨莊嚴殊妙之座成法自在普化衆生令一切衆生得殊勝座三種世間所不能壞廣大善根及善根具皆悉清淨令一切衆生得高廣座充滿不可説不可説世界諸佛如來於阿僧祇劫歎不能盡令一切衆生處大智人座一身充滿一切法界令一切衆生得不可思議寶莊嚴座隨其本願所請衆生廣開法施令一切衆生皆悉得坐淨妙法座於不可説諸世界中顯現如來自在神力令一切衆生坐一切寶座一切香座一切華座一切衣座一切鬘座一切摩尼寶座不可思議淨琉璃座無量不可説世界座淨一切衆生莊嚴座離諍座處此座上覺悟如來一切種智示現諸佛功德境界是為菩薩摩訶薩施種種座時善根回向令一切衆生得無所著菩提之座自然覺悟一切佛法
