body:
  text: 東晉天竺三藏佛馱跋陀羅譯入法界品第三十四之五爾時善財童子起不可思議恭敬之心好樂淨法專向大乘求諸佛智親近如來觀法境界無所障礙決定實際住實境界至三世際解了三世如虛空際決定了知三世法際不作法際住無礙際不違業際決定了知佛際非際住如來住滅一切妄想不著一切佛一切眷屬一切世界知一切衆生非我無實一切音聲離語言道解一切色猶如電光漸漸南行至彼城已周遍推問彌多羅女為在何所時有人答今在師子幢王宮內聞已即詣門下求見彼女時無量人衆悉入宮中善財問言諸人今者為詣何所答言我等欲詣彌多羅女聽受正法爾時善財作如是念此王宮門自在出入無所障礙善財即入見彼女人處在明淨寶藏法堂地玻璃色琉璃為柱金剛為壁閻浮檀金欄楯牖光明普照阿僧祇摩尼寶而莊校之又千寶藏摩尼寶鏡圓滿莊嚴衆生所樂明淨妙寶以為嚴飾又阿僧祇摩尼寶網羅覆其上百千金鈴出微妙音有如是等不可思議衆寶校具莊嚴講堂見彼女人身如真金目髮紺色處淨水香寶師子座覆以金網敷衆寶衣大衆圍繞以梵音聲而為説法見已頭面禮足繞無數匝合掌恭敬於一面住白言大聖我已先發阿耨多羅三藐三菩提心而未知菩薩云何學菩薩行修菩薩道答言善男子汝諦觀此法堂莊嚴爾時善財見一一琉璃柱中一一金剛壁中一一摩尼鏡中一一形像中一一寶中一一莊嚴中一一金鈴中一一寶樹中一一寶形像中一一寶瓔珞中悉見法界等一切如來從初發心修菩薩行成滿大願功德莊嚴成等正覺轉淨法輪乃至示現無餘涅槃如淨水中見月影像善財童子於一切境界莊嚴具中見一切佛從初發心乃至示現無餘涅槃亦復如是皆是彼女過去善根依果力故爾時善財正念諸佛恭敬合掌白言大聖此何法門答言善男子是般若波羅蜜普莊嚴法門我於三十六恆沙佛所修此法門彼諸如來各以異門令我入此般若波羅蜜普莊嚴法門善財白言大聖此法門者境界云何答言善男子我入此法門正念思惟分別受持生平等時得普門陀羅尼等百萬阿僧祇陀羅尼門以為眷屬所謂佛剎陀羅尼門佛陀羅尼門法陀羅尼門衆生陀羅尼門過去陀羅尼門未來陀羅尼門現在陀羅尼門安住實際陀羅尼門功德陀羅尼門功德具陀羅尼門智陀羅尼門智具陀羅尼門諸願陀羅尼門分別諸願陀羅尼門行陀羅尼門修集行陀羅尼門淨行陀羅尼門滿足行陀羅尼門業陀羅尼門不違業陀羅尼門業流陀羅尼門業所作陀羅尼門遠離惡業陀羅尼門向正業陀羅尼門業自在陀羅尼門善行陀羅尼門善行三昧陀羅尼門三昧陀羅尼門隨順三昧陀羅尼門分別三昧陀羅尼門無壞三昧陀羅尼門諸通明陀羅尼門心海陀羅尼門種種心陀羅尼門淨心地陀羅尼門普照重惡心陀羅尼門心喜調御師陀羅尼門發起衆生陀羅尼門煩惱陀羅尼門習氣陀羅尼門煩惱方便陀羅尼門欲陀羅尼門衆生所行陀羅尼門衆生種種業行陀羅尼門衆生世間自性陀羅尼門衆生相陀羅尼門方陀羅尼門説法陀羅尼門大悲陀羅尼門大慈陀羅尼門寂滅陀羅尼門諸言語道陀羅尼門方便非方便陀羅尼門隨順陀羅尼門分別陀羅尼門攝取陀羅尼門無礙實際陀羅尼門普陀羅尼門佛法陀羅尼門菩薩法陀羅尼門緣覺法陀羅尼門聲聞法陀羅尼門世間法陀羅尼門世界起陀羅尼門世界滅陀羅尼門世界形色陀羅尼門淨世界陀羅尼門垢世界陀羅尼門於淨世界現垢濁剎陀羅尼門於垢世界現清淨剎陀羅尼門純淨世界陀羅尼門純垢世界陀羅尼門平等世界陀羅尼門翻覆世界陀羅尼門伏住世界陀羅尼門入因陀羅網陀羅尼門回轉世界陀羅尼門住相陀羅尼門小處置大陀羅尼門大處置小陀羅尼門分別佛身陀羅尼門放佛莊嚴光明網陀羅尼門分別如來圓滿音聲陀羅尼門佛正法輪陀羅尼門生佛法輪陀羅尼門分別佛法輪陀羅尼門無壞佛法輪陀羅尼門佛辨法輪陀羅尼門向佛法輪陀羅尼門能作佛事陀羅尼門向諸佛衆陀羅尼門分別諸佛大衆陀羅尼門諸佛無盡大眷屬海陀羅尼門普照佛力陀羅尼門如來三昧陀羅尼門如來三昧神力自在陀羅尼門究竟佛事陀羅尼門住佛所住陀羅尼門佛持陀羅尼門佛化陀羅尼門佛知衆生心心所行陀羅尼門佛神力自在陀羅尼門住兜率天陀羅尼門乃至示現入般涅槃陀羅尼門饒益無量衆生陀羅尼門諸甚深法陀羅尼門諸莊嚴法陀羅尼門菩提心色法方便陀羅尼門菩提心起色陀羅尼門願色陀羅尼門行色陀羅尼門通明色陀羅尼門出生死色陀羅尼門清淨智色陀羅尼門清淨慧色陀羅尼門菩提無量色陀羅尼門自心淨色陀羅尼門善男子我唯知此般若波羅蜜普莊嚴法門諸大菩薩心如虛空入深法界功德成滿安住出世法遠離世間行具足清淨離癡慧眼決定了知無量法界智慧無量與虛空等得無礙眼於一切境界無所障礙住無礙地藏普照一切善能分別一切法義一切世間無能壞者行世間行無所染著善巧方便饒益攝取一切衆生隨其所應悉能示現於一切時轉正法輪而得自在如是功德我當云何能知能説善男子於此南方有一國土名曰救度彼有比丘名曰善現汝詣彼問云何菩薩學菩薩行修菩薩道時善財童子頭面禮足繞無數匝辭退南行爾時善財童子正念思惟甚深法門思惟甚深法界思惟甚深法地思惟甚深衆生思惟甚深諸行思惟甚深衆生心流思惟甚深衆生如光思惟甚深諸法之性思惟甚深衆生語法思惟甚深法界圓滿莊嚴思惟甚深種諸業行思惟甚深世間業所莊飾漸漸遊行至救度國於城都聚落村邑市里仙人住處山林曠野周遍推求善現比丘見彼比丘在林經行形貌端嚴顏容姝妙其髮右旋如紺青色頂有肉髻身色紫金其目長廣如青蓮華脣口丹色如頻婆果頸項圓直修短得所胸有德字勝妙莊嚴七處平滿其臂纖長手指縵網金輪莊嚴傭髀鹿腨腰腹不現師子上身如淨居天其身圓滿如尼拘樹王相好莊嚴如雪山王出諸良藥圓光一尋諸根調伏目視安諦智慧無礙猶如大海其心不動一切世間所不能壞天龍八部恭敬圍繞彼比丘經行時地天持地步天出寶蓮華隨覆其迹無盡圓滿天除滅衆暗覺天雨雜華雲不動藏天現諸寶藏普光勝虛空天莊嚴虛空妙德海天散寶供養離垢藏須彌山天合掌禮侍恭敬供養無礙力天起香華風雲而供養之夜天以莊嚴身五體敬禮常覺日天持明淨寶幢莊嚴虛空除滅暗冥爾時善財往詣其所頭面禮足白言大聖我向阿耨多羅三藐三菩提求菩薩行我聞大聖善能開導諸菩薩道云何菩薩學菩薩行修菩薩道願分別説答言善男子我年既少出家日近自我生來於三十八恆沙佛所淨修梵行或於一佛所七日七夜淨修梵行或餘佛所半月一月一歲百歲億那由他歲乃至不可説不可説歲或一小劫半劫一劫或阿僧祇劫乃至不可説不可説阿僧祇劫淨修梵行彼諸佛所聞法受持不違其教莊嚴諸願究竟淨修菩薩諸行具足六波羅蜜知菩提境界知種種法輪守護佛法乃至正法滅盡嚴淨一切諸佛世界出生三昧大願力故究竟菩薩一切淨行出生菩薩一切行願力故淨一切佛諸波羅蜜出生普賢諸行力故善男子我不離此經行處悉見十方智慧無礙故一切法界悉現在前於一念中過不可説不可説諸世界故於一念中嚴淨不可説諸佛世界出生大願力故不可説不可説衆生方便門悉現在前具十力智出生普賢菩薩行願力故見不可説不可説諸佛悉現在前於一念中恭敬供養不可説不可説世界微塵等佛恭敬供養如來願力故能聞受持不可説不可説諸佛法雲分別了知阿僧祇諸法趣出生法輪陀羅尼力故不可説不可説菩薩行悉現在前一切諸行皆悉清淨滿足菩薩因陀羅網行願力故不可説不可説諸三昧海悉現在前一切三昧皆悉淨滿一三昧出生一切三昧力故不可説不可説諸根海皆現在前一切根輪隨順時輪出生安住諸根際願力故不可説不可説時輪悉現在前能一切時轉淨法輪出生究竟衆生願力故一切三世海悉現在前分別一切世界三世出生隨順智慧光明願力故善男子我唯知此隨順菩薩燈明法門諸金剛燈菩薩生諸佛家具足成就不死命根無盡智慧成無壞身肢體具足隨其所應悉能顯現具妙形色世無倫匹毒刃火災所不能害身如金剛不可沮壞降伏衆魔制諸外道身真金色超出世間隨其所應無不聞見普觀世間雨甘露法普照一切滅諸障礙見者無厭拔斷一切諸不善根起妙善根難遇難見我當云何能知能説彼功德行善男子於此南方有一國土名曰輸那彼有童子名釋天主汝詣彼問云何菩薩學菩薩行修菩薩道時善財童子專求菩薩莊嚴正道菩薩諸力照心修行菩薩無壞無盡諸功德行成滿菩薩堅固大願以大莊嚴而自莊嚴一切無畏不退堅固正直之心受持一切菩薩行雲受持菩薩正法之雲而無厭足恭敬一切菩薩功德攝取一切衆生常欲超出生死曠野樂欲見聞恭敬親近於善知識心無厭倦頭面禮足恭敬無量隨順教誨辭退南行爾時善財童子與天龍大衆眷屬圍繞至輸那國周遍推求釋天主童子時虛空中有諸天龍而告之曰善男子此童子在善城門外河水之側爾時善財見釋天主與一萬童子弄沙嬉戲即詣其所頭面禮足繞無數匝合掌恭敬於一面住白言大聖我已先發阿耨多羅三藐三菩提心而未知菩薩云何學菩薩行修菩薩道唯願解説答言善男子文殊師利教我相黶子法算數法印法我因知此三種法故得一切巧術智慧法門善男子我因此法門故知黶子算數印性疾病中毒為鬼所著諸魔所持悉能消伏立大小城都邑聚落善惡之相田業商估一切衆生身肢節相善趣惡趣行業之相知此衆生之於善趣知此衆生之於惡趣此聲聞此緣覺此如來地諸方便相如是等事我悉了知普令衆生修學此法復次善男子我亦了知菩薩算數之法所謂百千為一羅叉百千羅叉為一拘利百千拘利為一那由他廣説如阿僧祇品善男子若有無量百由旬等大沙聚我悉分別算知其數善男子如算法能知沙聚算知東方一切世界南西北方四維上下亦復如是算知一切世界中一切劫一切佛一切法一切菩薩一切業算數了知一切世界中一切四諦名號亦復如是善男子我唯知此巧術智慧法門諸大菩薩深入一切算數法門算數一切法深入三世算數之法算數一切衆生算數一切法算數一切佛算數一切佛名號算數一切菩薩一切算數轉自在輪菩薩我當云何能知能説彼功德行發明境界讚歎諸力顯正直心説功德具説諸大願顯現清淨諸波羅蜜説功德藏勝妙智慧善男子於此南方有城名曰海住有優婆夷名曰自在汝詣彼問云何菩薩學菩薩行修菩薩道時善財童子聞善知識教歡喜無量得未曾有奇特正直心寶其心弘廣普覆衆生得算數諸佛次第出世自在法門淨法圓滿智慧究竟分別顯現一切諸趣於三世境界無所障礙出生無盡功德海心得大智慧自在光明斷三界縛頭面禮足右繞三匝辭退南行爾時善財童子於善知識心無厭足猶如大海吞納衆流善知識日明淨慧光開發其心猶蓮華敷長養一切善根萌芽莖節枝葉功德大樹善知識月能以清涼教法光明除衆熱惱善知識者如夏雪山衆獸所集樂善知識心猶如大海衆寶充滿善知識教長養法身如閻浮樹華果具足心常樂住善知識教法譬如龍王於虛空中神變自在善知識教起大寶山顯現一切以善知識教而自圍繞猶如帝釋降阿修羅無能壞者漸漸遊行至海住城周遍推求自在優婆夷時有人言善男子此優婆夷在此城中深宮之內善財聞已往詣宮門敬心而立彼優婆夷所住之處廣博嚴飾衆寶垣牆周匝圍繞開置四門阿僧祇寶以為莊嚴善財進入見優婆夷處師子座年在盛美容色殊妙觀者無厭除莊嚴具素服被髮身色光明除佛菩薩餘無能及於其宮內敷十億床出過天人菩薩宿世行業所造衣服飲食衆妙寶物諸莊嚴具常開四門周給一切而無窮盡一萬女衆眷屬圍繞容色威儀悉如諸天猶如莊嚴衆妙寶樹口常演出天妙音聲敬樂觀察此優婆夷禮拜供養彼諸女身常出妙香普熏大城若有聞者皆得不退菩提之心無怒害心無怨敵心無慳嫉心無幻偽心無諂曲心無貪愛心無瞋恚心無懈怠心無量心平等心大慈心益衆生心淨持戒心無求欲心聞彼音聲皆悉歡喜身心柔軟其有見者皆得離欲爾時善財頭面禮彼優婆夷足敬心右繞於一面住白言大聖我已先發阿耨多羅三藐三菩提心而未知菩薩云何學菩薩行修菩薩道答言善男子我成就無盡功德藏莊嚴法門以一器食施百衆生隨其所欲皆得充滿千衆生百千衆生億衆生千億衆生百千億衆生那由他衆生百那由他衆生百千那由他衆生乃至不可説不可説衆生閻浮提微塵等衆生乃至不可説不可説佛剎微塵等衆生隨其所欲皆悉充滿而無損減又復施與上味美膳輦輿衣服華鬘妙香末香塗香寶莊嚴具又施床座車乘妙蓋幢幡如是等種種諸物隨其所欲悉令充滿皆大歡喜善男子於東方一世界乃至不可説不可説世界閻浮提微塵等世界乃至不可説不可説佛剎微塵等世界中一切聲聞緣覺食我食已悉成道果又於東方乃至不可説不可説佛剎微塵等世界中一生補處菩薩食我食已降魔成道南西北方四維上下亦復如是善男子汝見我此一萬眷屬女不唯然已見善男子如是等百萬阿僧祇菩薩悉我同行同願同善根同修道同欲性同淨正念同清淨趣同菩提無量同得諸根同心依果同境界同正趣離生同真實義同明正法同具菩薩清淨妙色同無量力同堅精進同正法音同語言道同諸功德同清淨業同清淨報同清淨大悲救護一切同清淨業不違因緣同清淨口業於一切佛衆隨其所應悉為説法同恭敬供養諸佛同決定知一切諸法同得菩薩清淨諸地此諸菩薩取我器食於一念頃遍遊十方供養一切聲聞緣覺菩薩諸佛及施餓鬼悉令滿足而我器食無所損減善男子我此器食隨應諸天悉令充滿乃至施人亦復如是善男子且待須臾汝自見之善財即見無量人衆從四門入彼優婆夷皆令安坐隨所適樂悉令充悅善男子我唯得此無盡功德藏莊嚴法門諸大菩薩無盡功德藏海猶如虛空以無量功德熏修其心如隨意寶滿足一切衆生願故大功德城悉滅一切諸貧苦故功德須彌雨衆寶故大功德藏開法城門故功德燈明滅貧暗故大功德蓋勝妙善根覆一切衆生故我當云何能知能説彼功德行善男子於此南方有城名曰大興彼有長者名甘露頂汝詣彼問云何菩薩學菩薩行修菩薩道時善財童子頭面禮足繞無數匝憶念不捨辭退南行爾時善財童子得無盡功德光明法門正念思惟彼功德海觀察彼虛空功德趣彼功德聚登彼功德山攝彼功德藏盡彼功德底度彼功德海淨彼圓滿功德周遍觀察彼諸功德隨彼功德藏持彼功德教淨彼功德性漸漸遊行至大興城周遍推求長者甘露頂樂求善知識以善知識熏其身心於善知識起正直心觀善知識常無厭足學善知識勇猛精進求善知識一切善根同善知識一切善根於善知識無嫌恨心滿功德藏學善知識種種方便雖不由他悟而常親近諸善知識長諸善根淨修菩提正直之心增長一切菩薩諸根成就一切善根滿足大願發廣大悲近一切智不離諸佛增長普賢菩薩所行如來光明常照其心爾時善財見甘露頂於彼城內處七寶堂阿僧祇寶師子座上金剛伊尼羅寶以為座足離垢寶藏而以校飾五百寶像以為莊嚴建衆寶幢垂寶繒幡張衆寶帳無量寶網羅覆其上有人手執閻浮檀金蓋琉璃為竿復有執持離垢寶拂侍立左右衆妙雜香而以熏之雨天華雲作五百種勝妙妓樂娛樂城內一萬大衆周匝圍繞顏容姝妙天人無倫成就菩薩直心莊嚴衆生悉常隨順甘露頂教宿世同修諸善根故爾時善財頭面禮足繞無數匝恭敬合掌於一面住白言大聖我為利益一切衆生故發阿耨多羅三藐三菩提心所謂滅一切衆生苦惱令安隱住究竟快樂度生死海到法寶洲消竭貪愛修大悲念除五欲渴樂一切智令究竟度生死曠野常樂一切諸佛功德超出三界至薩婆若城而未知菩薩云何學菩薩行修菩薩道攝一切衆生長者答言善哉善哉童子乃能發阿耨多羅三藐三菩提心若能發心學菩薩道修菩薩行此人難得求善知識見善知識親近恭敬於善知識其心不退而無厭足善男子汝見我此一萬眷屬不唯然已見我本為彼説種種法令發阿耨多羅三藐三菩提心生如來家修白淨法滿足無量諸波羅蜜具佛十力離世間姓立如來姓壞生死輪轉淨法輪滅三惡道立正法趣善男子當知菩薩悉能救護一切衆生善男子我成就此如意功德寶藏法門隨其所須悉滿彼願謂以衆寶車乘象馬僮僕衣服飲食香華末香燈明湯藥幢幡繒蓋隨意眷屬天冠寶飾一切珍玩資生之具盡給施之乃至以法廣施衆生善男子且待須臾汝自見之即時善財見諸方國城邑聚落一切衆生來詣其所悉命令坐時甘露頂仰視虛空隨諸來會一切所須悉從空下滿足其願既充願已為説正法悉令長養諸功德藏消生死愛渴仰佛法乃至具足大人味味之相滅貧窮苦富甘露財降伏衆魔無能壞者成就十力無上智慧如是等類悉滿願已皆大歡喜隨所來方各還本處善男子我唯知此如意功德寶藏法門諸大菩薩具足一切自在功德成就寶手覆一切剎雨無量雲謂衆寶雲種種色莊嚴雲種種色寶天冠雲種種色衣雲種種妙聲雲種種華雲種種周羅摩尼寶雲種種色香雲種種色蓋雲種種色幢幡雲皆悉充滿一切世界一切佛剎一切諸佛及其眷屬為教化一切衆生令供養一切佛故我當云何能知能説彼菩薩行顯其自在善男子於此南方有城名師子重閣彼有長者名法寶周羅汝詣彼問云何菩薩學菩薩行修菩薩道時善財童子歡喜踊躍頭面敬禮繞無數匝如弟子法作如是念因善知識得一切智於善知識生無壞心聞善知識教悉能隨順調伏諸根作是念已辭退南行爾時善財童子正念如意功德寶藏法門守護彼功德藏淨彼功德須彌山王得彼功德海之源底開彼功德藏觀彼功德藏圓滿清淨彼功德藏攝彼功德藏出生長養彼功德藏力漸漸遊行至於彼城周遍推求長者法寶周羅於道遇見頭面禮足合掌恭敬於一面住白言大聖我已先發阿耨多羅三藐三菩提心而未知菩薩云何學菩薩行修菩薩道時彼長者執善財手將歸其家善男子且觀我家爾時善財遍觀舍宅悉閻浮檀金色七寶為牆周匝圍繞琉璃莊嚴硨磲為柱敷赤真珠寶師子座建師子寶幢張琉璃寶帳如意珠網羅覆其上阿僧祇寶而莊嚴之馬瑙寶池八功德水盈滿其中一切寶樹周匝圍繞其宅廣大十重八門爾時善財見最下重設衆肴膳惠施一切見第二重施雜寶衣見第三重施惠一切寶莊嚴具見第四重施內眷屬悉履善行巧於語言見第五重乃至五住菩薩雲集其中結集正法離世間樂出一切論諸陀羅尼三昧法印分別三昧智慧光明見第六重得般若波羅蜜菩薩充滿其中具甚深智得寂靜明智慧藏地無礙法門超出三有境界無礙念不二法結集般若波羅蜜門分別解説般若波羅蜜門所謂寂滅藏般若波羅蜜門分別一切衆生般若波羅蜜門不動轉般若波羅蜜門離欲普照般若波羅蜜門不可壞藏般若波羅蜜門一切衆生淨眼般若波羅蜜門海藏般若波羅蜜門普眼般若波羅蜜門一切無盡方便海般若波羅蜜門隨順衆生普照無礙般若波羅蜜門慶雲漸下般若波羅蜜門結集如是等百萬阿僧祇般若波羅蜜門彼菩薩衆不可説莊嚴而莊嚴之見第七重響忍菩薩充滿其中出方便智悉能聞持諸佛法雲見第八重常住菩薩充滿其中具諸神通遍一切剎照一切衆生一切法界具足法身詣一切佛無所障礙悉能受持一切佛法見第九重補處菩薩充滿其中見第十重一切如來充滿其中從初發心修菩薩行超出生死滿足大願神力自在一切佛剎及其眷屬轉淨法輪化度衆生顯現住持爾時善財見如是等奇特事已白言大聖我未曾見如是清淨大衆昔於何處種諸善根今得如是勝妙果報善男子我憶過去無量光明法界普莊嚴王如來應供等正覺明行足善逝世間解無上士調御丈夫天人師佛世尊出興于世彼佛入城我以香華妓樂而供養之供養已持此善根回向三處謂滅除貧苦常見諸佛菩薩及善知識恆聞正法故獲斯報善男子我唯知此滿足大願法門諸大寶海菩薩得不可壞清淨法身不可壞法雲普覆一切具足成就不可壞功德不可壞大功德網普覆一切入不可壞三昧境界具足菩薩不可壞善根住不可壞如來所住不可壞智慧究竟三世住一切劫而無疲倦住不可壞普眼境界地我當云何能知能説彼功德行善男子於此南方有一國土名實利根城名普門彼有長者名普眼妙香汝詣彼問云何菩薩學菩薩行修菩薩道時善財童子頭面敬禮法寶周羅足已辭退南行
